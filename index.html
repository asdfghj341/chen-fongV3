                                        <span className="text-neutral-400 text-sm transition-colors duration-300">&times;</span>
                                        <div className="flex-1"><input type="number" value={tapeWideUnitPrice} onChange={(e) => updateProjectField('tapeWideUnitPrice', e.target.value)} className="block w-full rounded-md border-neutral-300 py-1 px-2 text-sm border focus:ring-primary-500 focus:border-primary-500 text-primary-700 bg-surface print-text-right transition-colors duration-300" placeholder="單價" /></div>
                                    </div>
                                    <div className="flex gap-2 items-center mb-2 print-avoid-break">
                                        <div className="w-16 flex-shrink-0 text-sm text-left font-medium transition-colors duration-300">窄版膠帶</div>
                                        <div className="flex-1"><input type="number" value={tapeNarrowRolls} onChange={(e) => updateProjectField('tapeNarrowRolls', e.target.value)} className="block w-full rounded-md border-neutral-300 py-1 px-2 text-sm border focus:ring-primary-500 focus:border-primary-500 bg-surface text-neutral-800 print-text-right transition-colors duration-300" placeholder="數量" /></div>
                                        <span className="text-neutral-400 text-sm transition-colors duration-300">&times;</span>
                                        <div className="flex-1"><input type="number" value={tapeNarrowUnitPrice} onChange={(e) => updateProjectField('tapeNarrowUnitPrice', e.target.value)} className="block w-full rounded-md border-neutral-300 py-1 px-2 text-sm border focus:ring-primary-500 focus:border-primary-500 text-primary-700 bg-surface print-text-right transition-colors duration-300" placeholder="單價" /></div>
                                    </div>
                                    
                                    <div className="text-right text-sm mt-3 pt-3 border-t border-neutral-100 transition-colors duration-300 print-avoid-break">
                                        <div className="font-bold text-neutral-700 transition-colors duration-300">無稅耗材總計: {formatCurrency(totalConsumablesCost)}</div>
                                    </div>
                                </div>
                            </div>
                        </Card>

                        {/* 6. 毛利 (錨定未稅基準) */}
                        <Card title="第六大項：毛利分析 (依未稅基準評估)" icon={TrendingUp} className="print-page-break">
                            <div className="space-y-3 text-lg text-left">
                                <div className="flex justify-between font-semibold items-end border-b border-neutral-200 pb-2 transition-colors duration-300">
                                    <span>總營收 (請款未稅)</span>
                                    <div className="text-right">
                                        <span>{formatCurrency(totalPaymentAmount)}</span>
                                        <div className="text-xs text-neutral-400 font-normal mt-1 transition-colors duration-300 print:text-black">含稅實收參考: {formatCurrency(totalPaymentAmount + Math.round(totalPaymentAmount * 0.05))}</div>
                                    </div>
                                </div>

                                <div className="text-sm text-neutral-600 space-y-2 pt-2 transition-colors duration-300 print:text-black">
                                    <div className="font-semibold text-neutral-800 mb-2 transition-colors duration-300 print:text-black">未稅成本結構：</div>
                                    <div className="flex justify-between"><span>(-) 扣款合計</span><span>{formatCurrency(totalDeductionAmount)}</span></div>
                                    <div className="flex justify-between"><span>(-) 施作費用</span><span>{formatCurrency(totalSubPayment)}</span></div>
                                    <div className="flex justify-between"><span>(-) 運費/雜項</span><span>{formatCurrency(totalShippingCost)}</span></div>
                                    <div className="flex justify-between"><span>(-) 隔音墊成本</span><span>{formatCurrency(matTotalCost)}</span></div>
                                    <div className="flex justify-between border-t border-neutral-100 pt-1 mt-1 text-neutral-500 transition-colors duration-300 print:text-black">
                                        <span>(-) 膠材耗材 (不計稅)</span><span>{formatCurrency(totalConsumablesCost)}</span>
                                    </div>
                                </div>

                                <div className="flex justify-between text-danger-500 font-semibold border-t border-dashed border-neutral-300 pt-3 items-start print:text-black transition-colors duration-300">
                                    <span>總成本合計 (未稅)</span>
                                    <div className="text-right">
                                        <span>{formatCurrency(totalCost)}</span>
                                        <div className="text-xs text-danger-400 font-normal mt-1 transition-colors duration-300 print:text-black">含稅實付參考: {formatCurrency(totalCost + totalCostTax)}</div>
                                    </div>
                                </div>

                                <div className="border-t border-neutral-400 my-4 transition-colors duration-300"></div>

                                <div className="grid grid-cols-2 gap-4 print-avoid-break">
                                    <div className="bg-success-50 p-4 rounded-lg text-center print:bg-transparent print:border print:border-neutral-200 transition-colors duration-300">
                                        <div className="text-sm text-success-700 mb-1 transition-colors duration-300 print:text-black">未稅毛利金額</div>
                                        <div className={`text-2xl font-bold ${grossProfit >= 0 ? 'text-success-600' : 'text-danger-600'} transition-colors duration-300 print:text-black`}>
                                            {formatCurrency(grossProfit)}
                                        </div>
                                    </div>
                                    <div className="bg-accent-50 p-4 rounded-lg text-center print:bg-transparent print:border print:border-neutral-200 transition-colors duration-300">
                                        <div className="text-sm text-accent-700 mb-1 transition-colors duration-300 print:text-black">實質毛利率</div>
                                        <div className={`text-2xl font-bold ${grossMargin >= 0 ? 'text-accent-600' : 'text-danger-600'} transition-colors duration-300 print:text-black`}>
                                            {grossMargin.toFixed(2)}%
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </Card>
                    </div>
                </div>
            );
        }

        // --- 強制觸發渲染機制 ---
        // 確保在即時預覽編輯器 (Canvas) 環境中，貼上程式碼後能無視 window.onload 狀態直接強制重繪 React 畫面
        const container = document.getElementById('root');
        if (container) {
            if (!window._reactRoot) {
                window._reactRoot = ReactDOM.createRoot(container);
            }
            window._reactRoot.render(React.createElement(window.SoundproofingCalculator));
        }
    </script>
</body>
</html>
