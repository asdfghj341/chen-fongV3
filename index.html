<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隔音墊施工計算 (雲端協作版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAOL5kA2POWbfGLULAwERTxzetCqVo_Xx8",
            authDomain: "chen-fongv1.firebaseapp.com",
            projectId: "chen-fongv1",
            storageBucket: "chen-fongv1.firebasestorage.app",
            messagingSenderId: "251834902996",
            appId: "1:251834902996:web:b9b7fd80823c1a216b8e41"
        };

        if (!firebase.apps.length) {
            window.firebaseApp = firebase.initializeApp(firebaseConfig);
        } else {
            window.firebaseApp = firebase.app();
        }
        window.db = firebase.firestore();
        window.auth = firebase.auth();
        
        window.onerror = function(message, source, lineno, colno, error) {
            const display = document.getElementById('error-display');
            if (display) {
                display.style.display = 'block';
                display.innerHTML = `<strong>發生錯誤：</strong><br>${message}<br><small>${source}:${lineno}</small>`;
            }
        };
    </script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        #error-display { display: none; padding: 20px; background: #fee2e2; color: #991b1b; border: 1px solid #f87171; margin: 20px; border-radius: 8px; }
        .login-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        
        /* 列印專用樣式 */
        @media print {
            body { background: white; min-height: auto; padding: 0; }
            .no-print { display: none !important; }
            .print-col { display: block !important; break-inside: avoid; }
            input, select { 
                border: none !important; 
                outline: none !important; 
                box-shadow: none !important; 
                padding: 0 !important; 
                background: transparent !important; 
                -webkit-appearance: none;
                -moz-appearance: none;
                appearance: none;
                color: black !important;
            }
            .shadow, .shadow-sm, .shadow-xl { box-shadow: none !important; }
            .border { border-color: #e2e8f0 !important; }
            .max-w-4xl { max-w: 100% !important; margin: 0 !important; padding: 0 !important; }
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <div id="error-display"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;

        // --- 輔助函數 ---
        const parseNum = (val) => {
            if (!val) return 0;
            const num = parseFloat(val);
            return isNaN(num) ? 0 : num;
        };
        const formatCurrency = (num) => new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', maximumFractionDigits: 0 }).format(num);
        const formatNumber = (num) => new Intl.NumberFormat('zh-TW').format(num);
        const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2);
        const getUserName = (user) => user ? (user.displayName || user.email.split('@')[0]) : '未知';

        // --- ICONS ---
        const IconBase = ({ d, color="currentColor" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d={d} />
            </svg>
        );
        const Trash2 = () => <IconBase d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6" />;
        const Calculator = () => <IconBase d="M6 2h12a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z M6 10h12 M6 14h12 M6 18h12" />; 
        const DollarSign = () => <IconBase d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />;
        const Package = () => <IconBase d="M16.5 9.4l-9-5.19M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16zM3.27 6.96L12 12.01l8.73-5.05M12 22.08V12" />;
        const Activity = () => <IconBase d="M22 12h-4l-3 9L9 3l-3 9H2" />;
        const TrendingUp = () => <IconBase d="M23 6l-9.5 9.5-5-5L1 18" />;
        const Plus = () => <IconBase d="M12 5v14M5 12h14" />;
        const FolderOpen = () => <IconBase d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />;
        const Users = () => <IconBase d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2 M23 21v-2a4 4 0 0 0-3-3.87 M16 3.13a4 4 0 0 1 0 7.75" />;
        const Printer = () => <IconBase d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z" />;
        const LogOut = () => <IconBase d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4 M16 17l5-5-5-5 M21 12H9" />;
        const GoogleIcon = () => (
            <svg className="w-5 h-5" viewBox="0 0 24 24">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
        );

        // --- 資料處理 (相容 V1 架構與精準單價映射) ---
        const sanitizeProjects = (projects) => {
            if (!Array.isArray(projects)) return [];
            return projects.map(p => {
                let initialContracts = p.contracts || [];
                if (initialContracts.length === 0 && (p.contractQty || p.unitPrice)) {
                    initialContracts = [{ id: generateId(), name: '主合約', qty: (p.contractQty || '').toString(), price: (p.unitPrice || '').toString() }];
                } else if (initialContracts.length === 0) {
                    initialContracts = [{ id: generateId(), name: '材料合約', qty: '', price: '' }];
                }

                let initialPayments = p.paymentRequests || [];
                initialPayments = initialPayments.map(pr => {
                    if (pr.value !== undefined && pr.amount === undefined) {
                        const qty = pr.value.toString();
                        const amount = (parseNum(qty) * parseNum(p.unitPrice || 0)).toString();
                        return { id: pr.id || generateId(), name: pr.name || '期款', qty: qty, amount: amount };
                    }
                    return { id: pr.id || generateId(), name: pr.name || '期款', qty: pr.qty || '', amount: pr.amount || '' };
                });
                
                let initialShippingCosts = p.shippingCosts || [];
                if (initialShippingCosts.length === 0 && p.shippingCost) {
                    initialShippingCosts = [{ id: generateId(), name: '運費', value: p.shippingCost.toString() }];
                } else if (initialShippingCosts.length === 0) {
                    initialShippingCosts = [{ id: generateId(), name: '第一批運費', value: '' }];
                }

                const matType = p.matType || '3+';

                return {
                    ...p,
                    contracts: initialContracts,
                    paymentRequests: initialPayments,
                    deductions: (p.deductions || []).map(i => ({...i, id: i.id || generateId(), value: i.value || ''})),
                    deliveries: (p.deliveries || []).map(i => ({...i, id: i.id || generateId(), value: i.value || ''})),
                    subPayments: (p.subPayments || []).map(i => ({...i, id: i.id || generateId(), value: i.value || ''})),
                    estimations: p.estimations || [{ id: generateId(), name: '初版總預估', projectedArea: '', wasteRate: '11' }],
                    shippingCosts: initialShippingCosts,
                    unusedInventory: p.unusedInventory?.toString() || '',
                    projectedArea: p.projectedArea?.toString() || '',
                    wallArea: p.wallArea?.toString() || '',
                    glueBuckets: p.glueBuckets?.toString() || '',
                    tapeWideRolls: p.tapeWideRolls?.toString() || '',
                    tapeNarrowRolls: p.tapeNarrowRolls?.toString() || '',
                    glueUnitPrice: p.glueUnitPrice?.toString() || '1680',
                    tapeWideUnitPrice: p.tapeWideUnitPrice?.toString() || '24.5',
                    tapeNarrowUnitPrice: p.tapeNarrowUnitPrice?.toString() || '38',
                    matType: matType,
                    matUnitPrice: p.matUnitPrice?.toString() || (matType === '4+2' ? '170' : '150'),
                    expectedWasteRate: p.expectedWasteRate?.toString() || '11',
                    estimateUpdatedAt: p.estimateUpdatedAt || Date.now(),
                };
            });
        };

        const createInitialState = (projectName = '新專案', userName = '未知使用者', uid = null) => ({
            projectName: projectName, 
            uid: uid,
            lastUpdatedBy: userName,
            contracts: [{ id: generateId(), name: '材料合約', qty: '', price: '' }],
            paymentRequests: [{ id: generateId(), name: '第一期請款', qty: '', amount: '' }],
            deductions: [{ id: generateId(), name: '清潔費', value: '' }, { id: generateId(), name: '保留款', value: '' }],
            deliveries: [{ id: generateId(), date: '', value: '' }],
            shippingCosts: [{ id: generateId(), name: '第一批運費', value: '' }],
            unusedInventory: '',
            projectedArea: '',
            wallArea: '',
            subPayments: [{ id: generateId(), value: '' }],
            glueBuckets: '',
            tapeWideRolls: '',
            tapeNarrowRolls: '',
            lastUpdated: Date.now(),
            glueUnitPrice: '1680',
            tapeWideUnitPrice: '24.5',
            tapeNarrowUnitPrice: '38',
            matType: '3+',  
            matUnitPrice: '150', 
            estimations: [{ id: generateId(), name: '初版總預估', projectedArea: '', wasteRate: '11' }],
            estimateUpdatedAt: Date.now(), 
        });

        // --- 元件 ---
        const Card = ({ title, icon: Icon, children }) => (
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mb-6 print-col">
                <div className="bg-slate-50 px-6 py-4 border-b border-slate-100 flex items-center gap-2">
                    {Icon && <Icon />}
                    <h2 className="font-bold text-lg text-slate-800">{title}</h2>
                </div>
                <div className="p-6">{children}</div>
            </div>
        );

        const SectionHeader = ({ title }) => (
            <h3 className="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-3 mt-2">{title}</h3>
        );

        const TaxBreakdown = ({ amount, label = "含稅總額", colorClass = "text-slate-800", totalColorClass = "text-indigo-700" }) => {
            const tax = Math.round(amount * 0.05);
            const total = amount + tax;
            return (
                <div className="mt-3 border-t border-slate-200 pt-3">
                    <div className="flex justify-between text-xs text-slate-500 mb-1">
                        <span>未稅金額:</span>
                        <span>{formatCurrency(amount)}</span>
                    </div>
                    <div className="flex justify-between text-xs text-slate-500 mb-2">
                        <span>營業稅 (5%):</span>
                        <span>{formatCurrency(tax)}</span>
                    </div>
                    <div className={`flex justify-between text-base font-bold ${colorClass}`}>
                        <span>{label}:</span>
                        <span className={totalColorClass}>{formatCurrency(total)}</span>
                    </div>
                </div>
            );
        };

        const InlineTax = ({ amount }) => {
            const tax = Math.round(amount * 0.05);
            const total = amount + tax;
            return (
                <div className="text-xs text-slate-500 mt-1 flex justify-end gap-3 font-normal">
                    <span>未稅: {formatCurrency(amount)}</span>
                    <span>稅: {formatCurrency(tax)}</span>
                    <span className="font-semibold text-slate-700">含稅: {formatCurrency(total)}</span>
                </div>
            );
        };

        const SimpleInput = ({ label, value, onChange, type = "number", placeholder = "", suffix = "" }) => (
            <div className="mb-4 text-left">
                <label className="block text-sm font-medium text-slate-700 mb-1">{label}</label>
                <div className="relative rounded-md shadow-sm">
                    <input
                        type={type}
                        value={value}
                        onChange={(e) => onChange(e.target.value)}
                        className="block w-full rounded-md border-slate-300 pl-3 pr-12 py-2 focus:border-blue-500 focus:ring-blue-500 sm:text-sm border print-text-right"
                        placeholder={placeholder}
                        step="any"
                    />
                    {suffix && (
                        <div className="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none no-print">
                            <span className="text-slate-500 sm:text-sm">{suffix}</span>
                        </div>
                    )}
                </div>
            </div>
        );

        const DynamicListItem = ({ item, index, labelPrefix, valueField = "value", dateField, updateRow, onRemove }) => {
            return (
                <div className="flex flex-col gap-1 pb-3 border-b border-slate-100 last:border-0">
                    <div className="flex gap-2 items-end text-left">
                        {dateField && (
                            <div className="w-1/3">
                                <label className="block text-xs text-slate-500 mb-1 no-print">日期</label>
                                <input
                                    type="date"
                                    value={item[dateField]}
                                    onChange={(e) => updateRow(item.id, dateField, e.target.value)}
                                    className="block w-full rounded-md border-slate-300 py-2 px-2 text-sm border focus:ring-blue-500"
                                />
                            </div>
                        )}
                        <div className="flex-1">
                            <label className="block text-xs text-slate-500 mb-1 no-print">{labelPrefix} {index + 1}</label>
                            <div className="flex items-center">
                                <span className="hidden print:inline-block mr-2 text-sm">{labelPrefix} {index + 1}:</span>
                                <input
                                    type="number"
                                    value={item[valueField]}
                                    onChange={(e) => updateRow(item.id, valueField, e.target.value)}
                                    className="block w-full rounded-md border-slate-300 py-2 px-3 text-sm border focus:ring-blue-500 print-text-right"
                                    placeholder="輸入未稅金額/數量"
                                />
                            </div>
                        </div>
                        <button onClick={() => onRemove(item.id)} className="mb-[2px] p-2 text-red-500 hover:bg-red-50 rounded-md transition-colors no-print">
                            <Trash2 />
                        </button>
                    </div>
                </div>
            );
        };

        const DynamicList = ({ items, onAdd, onRemove, onUpdate, ...props }) => (
            <div className="space-y-3 mb-4">
                {items.map((item, index) => (
                    <DynamicListItem key={item.id} item={item} index={index} updateRow={onUpdate} onRemove={onRemove} {...props} />
                ))}
                <button onClick={onAdd} className="flex items-center gap-1 text-sm text-blue-600 font-medium hover:text-blue-700 mt-2 no-print">
                    <Plus /> 新增項目
                </button>
            </div>
        );

        const DeductionItem = ({ item, updateRow, onRemove, placeholder = "項目名稱" }) => { 
            return (
                <div className="flex gap-2 items-end mb-3 text-left">
                    <div className="flex-1">
                        <label className="block text-xs text-slate-500 mb-1 no-print">名稱/備註</label>
                        <input
                            type="text"
                            value={item.name}
                            onChange={(e) => updateRow(item.id, 'name', e.target.value)}
                            className="block w-full rounded-md border-slate-300 py-2 px-3 text-sm border focus:ring-blue-500"
                            placeholder={placeholder}
                        />
                    </div>
                    <div className="w-1/3">
                        <label className="block text-xs text-slate-500 mb-1 no-print">未稅金額</label>
                        <input
                            type="number"
                            value={item.value}
                            onChange={(e) => updateRow(item.id, 'value', e.target.value)}
                            className="block w-full rounded-md border-slate-300 py-2 px-3 text-sm border focus:ring-blue-500 print-text-right"
                        />
                    </div>
                    <button onClick={() => onRemove(item.id)} className="mb-[2px] p-2 text-red-500 hover:bg-red-50 rounded-md no-print">
                        <Trash2 />
                    </button>
                </div>
            );
        };

        const LoginScreen = ({ onLogin, error }) => (
            <div className="min-h-screen login-bg flex flex-col items-center justify-center p-4">
                <div className="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md text-center">
                    <div className="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-6">
                        <Calculator />
                    </div>
                    <h1 className="text-2xl font-bold text-slate-800 mb-2">隔音墊施工計算</h1>
                    <p className="text-slate-500 mb-2">雲端協作版</p>
                    <p className="text-xs text-slate-400 mb-6">資料將與團隊即時同步</p>
                    
                    {error && (
                        <div className="mb-6 p-3 bg-red-50 text-red-600 border border-red-200 text-xs rounded-lg text-left break-words">
                            {error.includes('unauthorized-domain') 
                                ? '此網域未經 Firebase 授權。若要在此預覽，請至 Firebase 後台 (Authentication > Settings > Authorized domains) 將目前網域加入白名單。' 
                                : error}
                        </div>
                    )}
                    
                    <button 
                        onClick={onLogin}
                        className="w-full flex items-center justify-center gap-3 bg-white border border-slate-300 text-slate-700 font-semibold py-3 px-4 rounded-lg hover:bg-slate-50 transition-colors shadow-sm"
                    >
                        <GoogleIcon />
                        使用 Google 帳號登入
                    </button>
                </div>
            </div>
        );

        window.SoundproofingCalculator = function SoundproofingCalculator() {
            const [user, setUser] = useState(null);
            const [loadingAuth, setLoadingAuth] = useState(true);
            const [authError, setAuthError] = useState('');
            const [projects, setProjects] = useState([]);
            const [currentProjectId, setCurrentProjectId] = useState(null);
            const [tempProjectName, setTempProjectName] = useState(''); 

            // 身分驗證監聽
            useEffect(() => {
                const unsubscribe = window.auth.onAuthStateChanged(currentUser => {
                    setUser(currentUser);
                    setLoadingAuth(false);
                });
                return () => unsubscribe();
            }, []);

            const handleLogin = () => {
                setAuthError('');
                const provider = new firebase.auth.GoogleAuthProvider();
                window.auth.signInWithPopup(provider).catch(error => {
                    console.error("登入失敗:", error);
                    setAuthError(error.message);
                });
            };

            const handleLogout = () => {
                window.auth.signOut();
                setProjects([]); 
                setCurrentProjectId(null);
            };

            // Firestore 資料即時監聽
            useEffect(() => {
                if (!user) return;

                const unsubscribe = window.db.collection('projects')
                    .orderBy('lastUpdated', 'desc')
                    .onSnapshot(snapshot => {
                        const loadedProjects = snapshot.docs.map(doc => ({
                            id: doc.id,
                            ...doc.data()
                        }));
                        const sanitized = sanitizeProjects(loadedProjects);
                        setProjects(sanitized);

                        if (sanitized.length > 0) {
                            setCurrentProjectId(prevId => {
                                if (!prevId || !sanitized.find(p => p.id === prevId)) {
                                    return sanitized[0].id;
                                }
                                return prevId;
                            });
                        }
                    }, error => {
                        console.error("Firestore 監聽失敗:", error);
                    });

                return () => unsubscribe(); 
            }, [user]); 

            // 雲端更新共用函數
            const updateToFirestore = useCallback((docId, data) => {
                if (!user) return;
                window.db.collection('projects').doc(docId).update({ 
                    ...data, 
                    lastUpdated: Date.now(),
                    lastUpdatedBy: getUserName(user)
                }).catch(error => console.error(`更新失敗:`, error));
            }, [user]);

            // CRUD 操作
            const handleCreateProject = useCallback((name = `新專案 ${projects.length + 1}`) => {
                if (!user) return;
                const newProjectData = createInitialState(name, getUserName(user), user.uid);
                window.db.collection('projects').add(newProjectData)
                    .then(docRef => {
                        setCurrentProjectId(docRef.id);
                    })
                    .catch(error => console.error("新增專案失敗:", error));
            }, [projects.length, user]);

            const handleDeleteProject = (id) => {
                if (!confirm("確定要刪除此專案嗎？刪除後無法復原，其他人也將看不到此專案。")) return;
                window.db.collection('projects').doc(id).delete()
                    .catch(error => console.error("刪除專案失敗:", error));
            };

            const updateProjectField = useCallback((field, value) => {
                if (!currentProjectId) return;
                updateToFirestore(currentProjectId, { [field]: value });
            }, [currentProjectId, updateToFirestore]);

            const updateListField = useCallback((listName, itemId, field, value) => {
                const projectToUpdate = projects.find(p => p.id === currentProjectId);
                if (!projectToUpdate) return;
                const currentList = Array.isArray(projectToUpdate[listName]) ? projectToUpdate[listName] : [];
                const updatedList = currentList.map(item => 
                    item.id === itemId ? { ...item, [field]: value } : item
                );
                updateToFirestore(currentProjectId, { [listName]: updatedList });
            }, [currentProjectId, projects, updateToFirestore]);

            const addListItem = useCallback((listName, newItem) => {
                const projectToUpdate = projects.find(p => p.id === currentProjectId);
                if (!projectToUpdate) return;
                const currentList = Array.isArray(projectToUpdate[listName]) ? projectToUpdate[listName] : [];
                const updatedList = [...currentList, { ...newItem, id: generateId() }];
                updateToFirestore(currentProjectId, { [listName]: updatedList });
            }, [currentProjectId, projects, updateToFirestore]);

            const removeListItem = useCallback((listName, itemId) => {
                const projectToUpdate = projects.find(p => p.id === currentProjectId);
                if (!projectToUpdate) return;
                const currentList = Array.isArray(projectToUpdate[listName]) ? projectToUpdate[listName] : [];
                const updatedList = currentList.filter(i => i.id !== itemId);
                updateToFirestore(currentProjectId, { [listName]: updatedList });
            }, [currentProjectId, projects, updateToFirestore]);

            const currentProject = useMemo(() => {
                if (projects.length === 0) return createInitialState('載入中...', '系統');
                return projects.find(p => p.id === currentProjectId) || projects[0];
            }, [projects, currentProjectId]);

            useEffect(() => {
                setTempProjectName(currentProject.projectName);
            }, [currentProject.projectName]); 

            useEffect(() => {
                if (!currentProjectId || tempProjectName === currentProject.projectName) return;
                const handler = setTimeout(() => {
                    updateProjectField('projectName', tempProjectName);
                }, 500);
                return () => clearTimeout(handler);
            }, [tempProjectName, currentProject.projectName, currentProjectId, updateProjectField]);

            const handlePrint = () => {
                const today = new Date();
                const yyyy = today.getFullYear();
                const mm = String(today.getMonth() + 1).padStart(2, '0');
                const dd = String(today.getDate()).padStart(2, '0');
                const dateStr = `${yyyy}${mm}${dd}`;
                const safeProjectName = currentProject.projectName.replace(/[/\\?%*:|"<>]/g, '-');
                const fileName = `${dateStr}_${safeProjectName}`;
                
                const originalTitle = document.title;
                document.title = fileName;
                window.print();
                document.title = originalTitle;
            };

            if (loadingAuth) {
                return <div className="min-h-screen flex items-center justify-center text-slate-500">載入中...</div>;
            }

            if (!user) {
                return <LoginScreen onLogin={handleLogin} error={authError} />;
            }

            if (projects.length === 0) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4">
                        <div className="text-slate-500 mb-4">雲端尚未建立任何專案</div>
                        <button onClick={() => handleCreateProject()} className="bg-blue-600 text-white px-4 py-2 rounded">建立第一個專案</button>
                        <button onClick={handleLogout} className="mt-4 text-sm text-slate-400 underline">登出</button>
                    </div>
                );
            }

            const { 
                projectName, contracts, paymentRequests, deductions, 
                deliveries, unusedInventory, projectedArea, wallArea, 
                subPayments, glueBuckets, tapeWideRolls, tapeNarrowRolls, shippingCosts,
                glueUnitPrice, tapeWideUnitPrice, tapeNarrowUnitPrice,
                matType, matUnitPrice, estimations,
                estimateUpdatedAt, lastUpdated, lastUpdatedBy
            } = currentProject;

            const ROLL_AREA = matType === '4+2' ? 75 : 50; 

            // 第一大項
            const totalContractQty = contracts.reduce((sum, c) => sum + parseNum(c.qty), 0);
            const totalContractAmount = contracts.reduce((sum, c) => sum + (parseNum(c.qty) * parseNum(c.price)), 0);
            const totalPaymentQty = paymentRequests.reduce((sum, pr) => sum + parseNum(pr.qty), 0);
            const totalPaymentAmount = paymentRequests.reduce((sum, pr) => sum + parseNum(pr.amount), 0);
            const remainingContractQty = totalContractQty - totalPaymentQty;
            const remainingContractAmount = totalContractAmount - totalPaymentAmount;
            const totalDeductionAmount = deductions.reduce((sum, curr) => sum + parseNum(curr.value), 0);
            
            // 第二大項
            const totalDelivered = deliveries.reduce((acc, curr) => acc + parseNum(curr.value), 0);
            const totalUsedInventory = totalDelivered - parseNum(unusedInventory);
            
            // 第三大項
            const totalArea = totalUsedInventory * ROLL_AREA;
            const totalProjectArea = parseNum(projectedArea) + parseNum(wallArea);
            const wasteAreaDisplay = Math.max(0, totalProjectArea > 0 ? totalArea - totalProjectArea : 0);
            const calculatedWasteRate = totalArea > 0 ? ((parseNum(wallArea) + wasteAreaDisplay) / totalArea) * 100 : 0;
            
            // 第四大項
            let totalEstimatedRolls = 0;
            let totalEstimatedArea = 0;

            const enrichedEstimations = estimations.map(est => {
                const pArea = parseNum(est.projectedArea);
                const wRateDecimal = parseNum(est.wasteRate) / 100;
                const validRate = wRateDecimal >= 1 ? 0.99 : wRateDecimal; 
                const expectedTotalArea = pArea > 0 ? (pArea / (1 - validRate)) : 0;
                const expectedRollsFloat = expectedTotalArea / ROLL_AREA;
                const expectedRollsCeil = Math.ceil(expectedRollsFloat); 

                totalEstimatedArea += expectedTotalArea;
                totalEstimatedRolls += expectedRollsCeil;

                return { ...est, expectedTotalArea, expectedRollsFloat, expectedRollsCeil };
            });

            const remainingToOrder = totalEstimatedRolls - totalDelivered;
            const remainingBudget = totalEstimatedRolls - totalUsedInventory;

            // 第五大項
            const totalSubPayment = subPayments.reduce((acc, curr) => acc + parseNum(curr.value), 0);
            const totalShippingCost = shippingCosts.reduce((sum, curr) => sum + parseNum(curr.value), 0);
            const totalConsumablesCost = (parseNum(glueBuckets) * parseNum(glueUnitPrice)) + (parseNum(tapeWideRolls) * parseNum(tapeWideUnitPrice)) + (parseNum(tapeNarrowRolls) * parseNum(tapeNarrowUnitPrice));
            const matTotalCost = totalArea * parseNum(matUnitPrice); 
            
            const totalCost = totalSubPayment + totalConsumablesCost + totalDeductionAmount + matTotalCost + totalShippingCost;
            const totalTaxableCost = totalSubPayment + totalShippingCost + totalDeductionAmount + matTotalCost;
            const totalCostTax = Math.round(totalTaxableCost * 0.05);
            
            // 第六大項
            const grossProfit = totalPaymentAmount - totalCost; 
            const grossMargin = totalPaymentAmount > 0 ? (grossProfit / totalPaymentAmount) * 100 : 0;

            return (
                <div className="max-w-4xl mx-auto pb-20 p-4 sm:p-6 text-center">
                    <header className="mb-6 flex flex-col md:flex-row justify-between items-center gap-4 no-print">
                        <div className="flex items-center gap-3">
                            <div className="bg-purple-100 p-2 rounded-full"><Users className="text-purple-600"/></div>
                            <div className="text-left">
                                <h1 className="text-2xl font-bold text-slate-800">隔音墊施工計算</h1>
                                <p className="text-xs text-slate-500 mt-1">
                                    雲端協作模式 • {getUserName(user)}
                                </p>
                            </div>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={handlePrint} className="text-sm flex items-center gap-1 text-blue-600 border border-blue-200 px-3 py-1.5 rounded-full hover:bg-blue-50 transition-all">
                                <Printer size={16} /> 匯出 PDF
                            </button>
                            <button onClick={handleLogout} className="text-sm flex items-center gap-1 text-slate-500 hover:text-slate-800 border px-3 py-1.5 rounded-full hover:bg-white transition-all">
                                <LogOut size={16} /> 登出
                            </button>
                        </div>
                    </header>
                    
                    <div className="flex flex-col md:flex-row gap-3 items-start md:items-center bg-white p-4 rounded-lg shadow-sm border border-slate-200 mb-6 no-print">
                        <div className="flex items-center gap-2 w-full md:w-auto">
                            <FolderOpen className="text-purple-600" />
                            <label className="text-sm font-semibold text-slate-700">切換專案:</label>
                        </div>
                        <select 
                            className="flex-grow p-2 border border-slate-300 rounded-md shadow-sm w-full md:w-auto"
                            value={currentProjectId || ''}
                            onChange={(e) => setCurrentProjectId(e.target.value)}
                        >
                            {projects.map(p => (
                                <option key={p.id} value={p.id}>
                                    {p.projectName} {p.lastUpdatedBy ? `(${p.lastUpdatedBy})` : ''}
                                </option>
                            ))}
                        </select>
                        <div className="flex gap-2 mt-2 md:mt-0 w-full md:w-auto justify-end">
                            <button onClick={() => handleCreateProject()} className="flex items-center gap-1 text-sm bg-purple-500 text-white px-3 py-2 rounded hover:bg-purple-600 shadow-sm"><Plus size={16}/> 新增</button>
                            <button onClick={() => handleDeleteProject(currentProjectId)} className="flex items-center gap-1 text-sm bg-white border border-red-200 text-red-500 px-3 py-2 rounded hover:bg-red-50"><Trash2 size={16}/> 刪除</button>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow p-6 mb-6 border border-slate-200 relative text-left print-col">
                        <div className="absolute top-4 right-4 text-xs text-slate-400 no-print">
                            最後編輯: {lastUpdatedBy} ({new Date(lastUpdated).toLocaleString()})
                        </div>
                        <div className="mb-4 pb-4 border-b border-slate-100">
                            <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1 no-print">專案名稱</label>
                            <input 
                                type="text" 
                                value={tempProjectName} 
                                onChange={(e) => setTempProjectName(e.target.value)} 
                                className="block w-full rounded border-0 border-b-2 border-slate-200 p-0 py-1 text-xl font-bold focus:ring-0 focus:border-blue-500 transition-colors print:text-2xl print:border-none print:text-center" 
                                placeholder="輸入專案名稱..." 
                            />
                        </div>
                        
                        <div className="w-full grid grid-cols-1 md:grid-cols-2 gap-6 bg-indigo-50/40 p-4 rounded-lg border border-indigo-100 print:bg-white print:border-slate-300 print:p-2">
                            <div className="text-sm text-left">
                                <label className="block text-sm text-indigo-800 mb-1 font-bold">隔音墊規格 (捲數換算基準)</label>
                                <select 
                                    value={matType} 
                                    onChange={(e) => {
                                        const newType = e.target.value;
                                        updateProjectField('matType', newType);
                                        updateProjectField('matUnitPrice', newType === '4+2' ? '170' : '150');
                                    }}
                                    className="block w-full rounded-md border-indigo-200 py-2 px-3 text-sm border focus:ring-indigo-500 focus:border-indigo-500 bg-white shadow-sm font-semibold text-slate-800"
                                >
                                    <option value="3+">普渼登 3+ (50 m²/卷)</option>
                                    <option value="4+2">普渼登 4+2 (75 m²/卷)</option>
                                </select>
                            </div>
                            <div className="text-sm text-left">
                                <label className="block text-sm text-indigo-800 mb-1 font-bold">隔音墊單價 (未稅)</label>
                                <input 
                                    type="number" 
                                    value={matUnitPrice} 
                                    onChange={(e) => updateProjectField('matUnitPrice', e.target.value)} 
                                    className="block w-full rounded-md border-indigo-200 py-2 px-3 text-sm border focus:ring-indigo-500 focus:border-indigo-500 shadow-sm print-text-right font-semibold text-slate-800" 
                                    placeholder="未稅單價" 
                                />
                            </div>
                        </div>
                    </div>

                    <div className="space-y-6">
                        {/* 1. 合約與請款 */}
                        <Card title="第一大項：合約總覽與請款進度" icon={DollarSign}>
                            <div className="grid md:grid-cols-2 gap-8">
                                <div>
                                    <SectionHeader title="合約明細結構 (未稅)" />
                                    <div className="space-y-3 mb-4">
                                        {contracts.map((c, index) => (
                                            <div key={c.id} className="flex gap-2 items-end pb-3 border-b border-slate-100">
                                                <div className="flex-1">
                                                    <label className="block text-xs text-slate-500 mb-1 no-print">項目名稱</label>
                                                    <input type="text" value={c.name} onChange={(e) => updateListField('contracts', c.id, 'name', e.target.value)} className="block w-full rounded-md border-slate-300 py-1.5 px-2 text-sm border focus:ring-blue-500 print:font-bold" placeholder="如: 材料 / A建案" />
                                                </div>
                                                <div className="w-20">
                                                    <label className="block text-xs text-slate-500 mb-1 no-print">數量(m²)</label>
                                                    <input type="number" value={c.qty} onChange={(e) => updateListField('contracts', c.id, 'qty', e.target.value)} className="block w-full rounded-md border-slate-300 py-1.5 px-2 text-sm border focus:ring-blue-500 print-text-right" placeholder="數量" />
                                                </div>
                                                <div className="w-24">
                                                    <label className="block text-xs text-slate-500 mb-1 no-print">未稅單價</label>
                                                    <input type="number" value={c.price} onChange={(e) => updateListField('contracts', c.id, 'price', e.target.value)} className="block w-full rounded-md border-slate-300 py-1.5 px-2 text-sm border focus:ring-blue-500 print-text-right" placeholder="單價" />
                                                </div>
                                                <button onClick={() => removeListItem('contracts', c.id)} className="mb-0.5 p-1.5 text-red-500 hover:bg-red-50 rounded-md no-print"><Trash2 /></button>
                                            </div>
                                        ))}
                                        <button onClick={() => addListItem('contracts', { name: '', qty: '', price: '' })} className="flex items-center gap-1 text-sm text-blue-600 font-medium hover:text-blue-700 mt-2 no-print"><Plus /> 新增合約項目</button>
                                    </div>
                                    
                                    <div className="bg-slate-50 p-4 rounded-lg border border-slate-200">
                                        <div className="flex justify-between text-sm text-slate-600 mb-1">
                                            <span>合約總數量:</span>
                                            <span className="font-bold">{formatNumber(totalContractQty)} m²</span>
                                        </div>
                                        <TaxBreakdown amount={totalContractAmount} label="合約總額 (含稅)" />
                                    </div>
                                </div>

                                <div>
                                    <SectionHeader title="實際請款進度 (未稅)" />
                                    <div className="space-y-3 mb-4">
                                        {paymentRequests.map((pr, index) => (
                                            <div key={pr.id} className="flex gap-2 items-end pb-3 border-b border-slate-100">
                                                <div className="flex-1">
                                                    <label className="block text-xs text-slate-500 mb-1 no-print">期數/說明</label>
                                                    <input type="text" value={pr.name} onChange={(e) => updateListField('paymentRequests', pr.id, 'name', e.target.value)} className="block w-full rounded-md border-slate-300 py-1.5 px-2 text-sm border focus:ring-blue-500" placeholder="如: 第一期" />
                                                </div>
                                                <div className="w-20">
                                                    <label className="block text-xs text-slate-500 mb-1 no-print">數量(m²)</label>
                                                    <input type="number" value={pr.qty} onChange={(e) => updateListField('paymentRequests', pr.id, 'qty', e.target.value)} className="block w-full rounded-md border-slate-300 py-1.5 px-2 text-sm border focus:ring-blue-500 print-text-right" placeholder="數量" />
                                                </div>
                                                <div className="w-28">
                                                    <label className="block text-xs text-slate-500 mb-1 no-print">未稅金額</label>
                                                    <input type="number" value={pr.amount} onChange={(e) => updateListField('paymentRequests', pr.id, 'amount', e.target.value)} className="block w-full rounded-md border-slate-300 py-1.5 px-2 text-sm border focus:ring-blue-500 print-text-right" placeholder="金額" />
                                                </div>
                                                <button onClick={() => removeListItem('paymentRequests', pr.id)} className="mb-0.5 p-1.5 text-red-500 hover:bg-red-50 rounded-md no-print"><Trash2 /></button>
                                            </div>
                                        ))}
                                        <button onClick={() => addListItem('paymentRequests', { name: '', qty: '', amount: '' })} className="flex items-center gap-1 text-sm text-blue-600 font-medium hover:text-blue-700 mt-2 no-print"><Plus /> 新增請款期數</button>
                                    </div>

                                    <div className="bg-blue-50 p-4 rounded-lg border border-blue-100 print:bg-white print:border-blue-200">
                                        <div className="flex justify-between text-sm text-blue-800 mb-1">
                                            <span>累積請款數量:</span>
                                            <span className="font-bold">{formatNumber(totalPaymentQty)} m²</span>
                                        </div>
                                        <TaxBreakdown amount={totalPaymentAmount} label="累積已請款 (含稅)" colorClass="text-blue-900" totalColorClass="text-blue-700" />
                                    </div>
                                </div>
                            </div>
                            
                            <div className="mt-6 pt-4 border-t border-slate-200">
                                <div className="flex flex-col md:flex-row justify-between items-center gap-4 bg-slate-800 text-white p-4 rounded-lg print:bg-white print:text-black print:border print:border-slate-800">
                                    <div className="flex items-center gap-2">
                                        <span className="font-semibold text-slate-300 print:text-black">合約未請款餘額：</span>
                                    </div>
                                    <div className="flex gap-6 text-right">
                                        <div>
                                            <div className="text-xs text-slate-400 print:text-slate-500">剩餘數量</div>
                                            <div className={`text-xl font-bold ${remainingContractQty < 0 ? 'text-red-400' : 'text-slate-100 print:text-black'}`}>{formatNumber(remainingContractQty)} m²</div>
                                        </div>
                                        <div>
                                            <div className="text-xs text-slate-400 print:text-slate-500">剩餘未稅金額</div>
                                            <div className={`text-2xl font-mono font-bold ${remainingContractAmount < 0 ? 'text-red-400' : 'text-green-400 print:text-black'}`}>{formatCurrency(remainingContractAmount)}</div>
                                            <div className="text-[10px] text-slate-400 mt-1">含稅: {formatCurrency(remainingContractAmount + Math.round(remainingContractAmount * 0.05))}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="mt-6 border-t border-slate-200 pt-4">
                                <SectionHeader title="扣款項目 (未稅)" />
                                {deductions.map(item => (
                                    <DeductionItem 
                                        key={item.id} item={item} 
                                        placeholder="例如: 清潔費"
                                        updateRow={(id, f, v) => updateListField('deductions', id, f, v)}
                                        onRemove={(id) => removeListItem('deductions', id)}
                                    />
                                ))}
                                <button onClick={() => addListItem('deductions', { name: '', value: '' })} className="flex items-center gap-1 text-sm text-blue-600 mt-2 no-print"><Plus size={16}/> 新增扣款</button>
                                <div className="text-right text-sm mt-3 pt-3 border-t border-slate-100">
                                    <div className="font-bold text-red-600">扣款總計 (未稅): -{formatCurrency(totalDeductionAmount)}</div>
                                    <InlineTax amount={totalDeductionAmount} />
                                </div>
                            </div>
                        </Card>

                        {/* 2. 進貨 */}
                        <Card title="第二大項：進貨與庫存" icon={Package}>
                            <div className="grid md:grid-cols-2 gap-6">
                                <div>
                                    <SectionHeader title="進貨紀錄 (卷)" />
                                    <DynamicList 
                                        items={deliveries} 
                                        onAdd={() => addListItem('deliveries', { date: '', value: '' })}
                                        onRemove={(id) => removeListItem('deliveries', id)}
                                        onUpdate={(id, f, v) => updateListField('deliveries', id, f, v)}
                                        valueField="value"
                                        labelPrefix="進貨" dateField="date" 
                                    />
                                    <div className="text-sm font-bold text-slate-700 bg-slate-100 p-2 rounded text-left print:border print:bg-white">累積進貨: {formatNumber(totalDelivered)}</div>
                                </div>
                                <div>
                                    <SectionHeader title="現場盤點" />
                                    <SimpleInput label="未使用數量 (卷)" value={unusedInventory} onChange={(v) => updateProjectField('unusedInventory', v)} />
                                    <div className="bg-orange-50 p-4 rounded-lg mt-4 text-left print:border print:bg-white print:border-orange-200">
                                        <div className="text-sm text-orange-800 font-semibold mb-1">實際使用量</div>
                                        <div className="text-2xl font-bold text-orange-600">{formatNumber(totalUsedInventory)}</div>
                                    </div>
                                </div>
                            </div>
                        </Card>

                        {/* 3. 實際損耗 */}
                        <Card title="第三大項：面積與實際損耗" icon={Activity}>
                            <div className="grid md:grid-cols-4 gap-4 mb-4">
                                <SimpleInput label="投影面積" value={projectedArea} onChange={(v) => updateProjectField('projectedArea', v)} />
                                <SimpleInput label="上牆面積" value={wallArea} onChange={(v) => updateProjectField('wallArea', v)} />
                                <div className="mb-4 text-left">
                                    <label className="block text-sm font-medium text-slate-700 mb-1">總面積 (供料)</label>
                                    <div className="bg-slate-100 border p-2 rounded text-lg font-bold text-blue-700 print:bg-white print:border-none print:px-0">{formatNumber(totalArea)}</div>
                                </div>
                                <div className="mb-4 text-left">
                                    <label className="block text-sm font-medium text-slate-700 mb-1">剩餘損耗 (殘料)</label>
                                    <div className="bg-slate-100 border p-2 rounded text-lg font-bold text-orange-700 print:bg-white print:border-none print:px-0">{formatNumber(wasteAreaDisplay)}</div>
                                </div>
                            </div>

                            <div className="bg-slate-800 text-white rounded-lg flex flex-col md:flex-row justify-between items-center gap-2 p-4 print:bg-white print:text-black print:border print:border-slate-800">
                                <div className="flex items-center gap-2">
                                    <span className="font-semibold text-slate-300 print:text-black">總損耗率結果：</span>
                                    <span className="text-xs bg-slate-700 px-2 py-1 rounded text-slate-400 print:bg-slate-100 print:text-slate-600">含上牆與殘料</span>
                                </div>
                                <span className="text-3xl font-mono text-yellow-400 print:text-black">{calculatedWasteRate.toFixed(2)}%</span>
                            </div>
                        </Card>

                        {/* 4. 預估備料 */}
                        <Card title="第四大項：施工前備料預估與檢核" icon={FolderOpen}>
                            <div className="mb-6 text-left">
                                <SectionHeader title="分批叫貨預估清單" />
                                <div className="space-y-4">
                                    {enrichedEstimations.map((est, index) => (
                                        <div key={est.id} className="flex flex-col md:flex-row gap-3 items-start md:items-end bg-slate-50 p-3 rounded-lg border border-slate-200 print:bg-white">
                                            <div className="w-full md:flex-1">
                                                <label className="block text-xs text-slate-500 mb-1 no-print">預估批次/名稱</label>
                                                <input type="text" value={est.name} onChange={(e) => updateListField('estimations', est.id, 'name', e.target.value)} className="block w-full rounded-md border-slate-300 py-1.5 px-3 text-sm border focus:ring-blue-500 print:font-bold" placeholder="例如: 第一批叫貨" />
                                            </div>
                                            <div className="w-full md:w-32">
                                                <label className="block text-xs text-slate-500 mb-1 no-print">投影面積 (m²)</label>
                                                <input type="number" value={est.projectedArea} onChange={(e) => updateListField('estimations', est.id, 'projectedArea', e.target.value)} className="block w-full rounded-md border-slate-300 py-1.5 px-3 text-sm border focus:ring-blue-500 print-text-right" placeholder="面積" />
                                            </div>
                                            <div className="w-full md:w-24">
                                                <label className="block text-xs text-slate-500 mb-1 no-print">預估損耗(%)</label>
                                                <input type="number" value={est.wasteRate} onChange={(e) => updateListField('estimations', est.id, 'wasteRate', e.target.value)} className="block w-full rounded-md border-slate-300 py-1.5 px-3 text-sm border focus:ring-blue-500 print-text-right" placeholder="比例" />
                                            </div>
                                            <div className="w-full md:w-auto px-2 pb-1 text-right">
                                                <div className="text-[10px] text-slate-500 mb-0.5 whitespace-nowrap">目標: {formatNumber(est.expectedTotalArea)} m²</div>
                                                <div className="text-lg font-bold text-indigo-700 whitespace-nowrap">{est.expectedRollsCeil} <span className="text-sm font-normal text-slate-500">卷</span></div>
                                            </div>
                                            <button onClick={() => removeListItem('estimations', est.id)} className="p-2 text-red-500 hover:bg-red-100 rounded-md transition-colors no-print"><Trash2 /></button>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => addListItem('estimations', { name: `預估批次 ${estimations.length + 1}`, projectedArea: '', wasteRate: '11' })} className="flex items-center gap-1 text-sm text-blue-600 font-medium hover:text-blue-700 mt-3 no-print"><Plus /> 新增預估批次</button>
                            </div>
                            <div className="border-t border-slate-200 pt-5 text-left">
                                <div className="flex justify-between items-center mb-3">
                                    <SectionHeader title="叫貨差距與進度檢核" />
                                    <span className="text-[10px] text-slate-400 no-print">預估系統最後更新：{new Date(estimateUpdatedAt || lastUpdated).toLocaleString()}</span>
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 bg-indigo-50 p-4 rounded-lg border border-indigo-100 print:bg-white print:border-slate-300">
                                    <div><div className="text-xs text-indigo-600 mb-1 font-semibold">累積預估總需求</div><div className="text-2xl font-bold text-slate-800">{totalEstimatedRolls} <span className="text-sm font-normal text-slate-500">卷</span></div></div>
                                    <div><div className="text-xs text-indigo-600 mb-1 font-semibold">目前已進貨</div><div className="text-2xl font-bold text-blue-600">{totalDelivered} <span className="text-sm font-normal text-slate-500">卷</span></div></div>
                                    <div className="bg-white p-2 rounded border border-indigo-100 shadow-sm print:shadow-none">
                                        <div className="text-xs text-indigo-600 mb-1 font-semibold">尚未叫貨預估量</div>
                                        <div className={`text-2xl font-bold ${remainingToOrder > 0 ? 'text-orange-600' : remainingToOrder < 0 ? 'text-red-500' : 'text-green-600'}`}>{remainingToOrder > 0 ? '+' : ''}{remainingToOrder} <span className="text-sm font-normal text-slate-500">卷</span></div>
                                    </div>
                                    <div className="bg-white p-2 rounded border border-indigo-100 shadow-sm print:shadow-none">
                                        <div className="text-xs text-indigo-600 mb-1 font-semibold">預估使用餘裕</div>
                                        <div className={`text-2xl font-bold ${remainingBudget >= 0 ? 'text-indigo-800' : 'text-red-600'}`}>{remainingBudget > 0 ? '+' : ''}{remainingBudget} <span className="text-sm font-normal text-slate-500">卷</span></div>
                                    </div>
                                </div>
                            </div>
                        </Card>

                        {/* 5. 成本 */}
                        <Card title="第五大項：成本分析" icon={Calculator}>
                            <div className="grid md:grid-cols-2 gap-8">
                                <div>
                                    <SectionHeader title="施作費用 (未稅)" />
                                    <DynamicList 
                                        items={subPayments} 
                                        onAdd={() => addListItem('subPayments', { value: '' })}
                                        onRemove={(id) => removeListItem('subPayments', id)}
                                        onUpdate={(id, f, v) => updateListField('subPayments', id, f, v)}
                                        valueField="value"
                                        labelPrefix="請款" 
                                    />
                                    <div className="text-right text-sm mt-3 pt-3 border-t border-slate-100">
                                        <div className="font-bold text-slate-700">施工費總計 (未稅): {formatCurrency(totalSubPayment)}</div>
                                        <InlineTax amount={totalSubPayment} />
                                    </div>
                                    
                                    <div className="mt-6 pt-4 border-t border-slate-200">
                                        <SectionHeader title="運費與雜項 (未稅)" />
                                        {shippingCosts.map(item => (
                                            <DeductionItem 
                                                key={item.id} item={item} 
                                                placeholder="例如: 第一批運費"
                                                updateRow={(id, f, v) => updateListField('shippingCosts', id, f, v)}
                                                onRemove={(id) => removeListItem('shippingCosts', id)}
                                            />
                                        ))}
                                        <button onClick={() => addListItem('shippingCosts', { name: '', value: '' })} className="flex items-center gap-1 text-sm text-blue-600 mt-2 no-print"><Plus size={16}/> 新增運費/雜項</button>
                                        <div className="text-right text-sm mt-3 pt-3 border-t border-slate-100">
                                            <div className="font-bold text-slate-700">運費總計 (未稅): {formatCurrency(totalShippingCost)}</div>
                                            <InlineTax amount={totalShippingCost} />
                                        </div>
                                    </div>
                                </div>
                                <div>
                                    <SectionHeader title="隔音墊成本 (未稅)" />
                                    <div className="bg-slate-50 p-4 rounded-lg border border-slate-200 mb-6">
                                        <div className="flex justify-between text-sm text-slate-600 mb-1">
                                            <span>規格: {matType} ({ROLL_AREA} m²/卷)</span>
                                        </div>
                                        <div className="flex justify-between text-sm text-slate-600 mb-2">
                                            <span>使用卷數: {formatNumber(totalUsedInventory)} 卷</span>
                                        </div>
                                        <div className="text-right text-sm border-t border-slate-200 pt-2 mt-2">
                                            <div className="font-bold text-blue-700">隔音墊成本 (未稅): {formatCurrency(matTotalCost)}</div>
                                            <InlineTax amount={matTotalCost} />
                                        </div>
                                    </div>

                                    <SectionHeader title="膠材耗材設定 (不計稅金)" />
                                    <div className="flex gap-2 items-center mb-2">
                                        <div className="w-16 flex-shrink-0 text-sm text-left font-medium">膠水</div>
                                        <div className="flex-1"><input type="number" value={glueBuckets} onChange={(e) => updateProjectField('glueBuckets', e.target.value)} className="block w-full rounded-md border-slate-300 py-1 px-2 text-sm border focus:ring-blue-500 print-text-right" placeholder="數量" /></div>
                                        <span className="text-slate-400 text-sm">&times;</span>
                                        <div className="flex-1"><input type="number" value={glueUnitPrice} onChange={(e) => updateProjectField('glueUnitPrice', e.target.value)} className="block w-full rounded-md border-slate-300 py-1 px-2 text-sm border focus:ring-blue-500 text-blue-700 print-text-right" placeholder="單價" /></div>
                                    </div>
                                    <div className="flex gap-2 items-center mb-2">
                                        <div className="w-16 flex-shrink-0 text-sm text-left font-medium">寬版膠帶</div>
                                        <div className="flex-1"><input type="number" value={tapeWideRolls} onChange={(e) => updateProjectField('tapeWideRolls', e.target.value)} className="block w-full rounded-md border-slate-300 py-1 px-2 text-sm border focus:ring-blue-500 print-text-right" placeholder="數量" /></div>
                                        <span className="text-slate-400 text-sm">&times;</span>
                                        <div className="flex-1"><input type="number" value={tapeWideUnitPrice} onChange={(e) => updateProjectField('tapeWideUnitPrice', e.target.value)} className="block w-full rounded-md border-slate-300 py-1 px-2 text-sm border focus:ring-blue-500 text-blue-700 print-text-right" placeholder="單價" /></div>
                                    </div>
                                    <div className="flex gap-2 items-center mb-2">
                                        <div className="w-16 flex-shrink-0 text-sm text-left font-medium">窄版膠帶</div>
                                        <div className="flex-1"><input type="number" value={tapeNarrowRolls} onChange={(e) => updateProjectField('tapeNarrowRolls', e.target.value)} className="block w-full rounded-md border-slate-300 py-1 px-2 text-sm border focus:ring-blue-500 print-text-right" placeholder="數量" /></div>
                                        <span className="text-slate-400 text-sm">&times;</span>
                                        <div className="flex-1"><input type="number" value={tapeNarrowUnitPrice} onChange={(e) => updateProjectField('tapeNarrowUnitPrice', e.target.value)} className="block w-full rounded-md border-slate-300 py-1 px-2 text-sm border focus:ring-blue-500 text-blue-700 print-text-right" placeholder="單價" /></div>
                                    </div>
                                    
                                    <div className="text-right text-sm mt-3 pt-3 border-t border-slate-100">
                                        <div className="font-bold text-slate-700">無稅耗材總計: {formatCurrency(totalConsumablesCost)}</div>
                                    </div>
                                </div>
                            </div>
                        </Card>

                        {/* 6. 毛利 (錨定未稅基準) */}
                        <Card title="第六大項：毛利分析 (依未稅基準評估)" icon={TrendingUp}>
                            <div className="space-y-3 text-lg text-left">
                                <div className="flex justify-between font-semibold items-end border-b border-slate-200 pb-2">
                                    <span>總營收 (請款未稅)</span>
                                    <div className="text-right">
                                        <span>{formatCurrency(totalPaymentAmount)}</span>
                                        <div className="text-xs text-slate-400 font-normal mt-1">含稅實收參考: {formatCurrency(totalPaymentAmount + Math.round(totalPaymentAmount * 0.05))}</div>
                                    </div>
                                </div>

                                <div className="text-sm text-slate-600 space-y-2 pt-2">
                                    <div className="font-semibold text-slate-800 mb-2">未稅成本結構：</div>
                                    <div className="flex justify-between"><span>(-) 扣款合計</span><span>{formatCurrency(totalDeductionAmount)}</span></div>
                                    <div className="flex justify-between"><span>(-) 施作費用</span><span>{formatCurrency(totalSubPayment)}</span></div>
                                    <div className="flex justify-between"><span>(-) 運費/雜項</span><span>{formatCurrency(totalShippingCost)}</span></div>
                                    <div className="flex justify-between"><span>(-) 隔音墊成本</span><span>{formatCurrency(matTotalCost)}</span></div>
                                    <div className="flex justify-between border-t border-slate-100 pt-1 mt-1 text-slate-500">
                                        <span>(-) 膠材耗材 (不計稅)</span><span>{formatCurrency(totalConsumablesCost)}</span>
                                    </div>
                                </div>

                                <div className="flex justify-between text-red-500 font-semibold border-t border-dashed border-slate-300 pt-3 items-start print:text-black">
                                    <span>總成本合計 (未稅)</span>
                                    <div className="text-right">
                                        <span>-{formatCurrency(totalCost)}</span>
                                        <div className="text-xs text-red-400 font-normal mt-1">含稅實付參考: -{formatCurrency(totalCost + totalCostTax)}</div>
                                    </div>
                                </div>

                                <div className="border-t border-slate-400 my-4"></div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-green-50 p-4 rounded-lg text-center print:bg-white print:border print:border-green-200">
                                        <div className="text-sm text-green-700 mb-1">未稅毛利金額</div>
                                        <div className={`text-2xl font-bold ${grossProfit >= 0 ? 'text-green-600' : 'text-red-600'}`}>
                                            {formatCurrency(grossProfit)}
                                        </div>
                                    </div>
                                    <div className="bg-purple-50 p-4 rounded-lg text-center print:bg-white print:border print:border-purple-200">
                                        <div className="text-sm text-purple-700 mb-1">實質毛利率</div>
                                        <div className={`text-2xl font-bold ${grossMargin >= 0 ? 'text-purple-600' : 'text-red-600'}`}>
                                            {grossMargin.toFixed(2)}%
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </Card>
                    </div>
                </div>
            );
        }

        // --- 強制觸發渲染機制 ---
        // 確保在即時預覽編輯器 (Canvas) 環境中，貼上程式碼後能無視 window.onload 狀態直接強制重繪 React 畫面
        const container = document.getElementById('root');
        if (container) {
            if (!window._reactRoot) {
                window._reactRoot = ReactDOM.createRoot(container);
            }
            window._reactRoot.render(React.createElement(window.SoundproofingCalculator));
        }
    </script>
</body>
</html>
