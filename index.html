<body class="bg-neutral-50 text-neutral-900 min-h-screen transition-colors duration-300">

    <div id="error-display"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;

        // --- 輔助函數 ---
        const parseNum = (val) => {
            if (!val) return 0;
            const num = parseFloat(val);
            return isNaN(num) ? 0 : num;
        };
        const formatCurrency = (num) => new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', maximumFractionDigits: 0 }).format(num);
        const formatNumber = (num) => new Intl.NumberFormat('zh-TW').format(num);
        const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2);
        const getUserName = (user) => user ? (user.displayName || user.email.split('@')[0]) : '未知';

        // --- ICONS ---
        const IconBase = ({ d, color="currentColor", className="" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" className={className} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d={d} />
            </svg>
        );
        const Trash2 = () => <IconBase d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6" />;
        const Calculator = ({className}) => <IconBase className={className} d="M6 2h12a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z M6 10h12 M6 14h12 M6 18h12" />; 
        const DollarSign = () => <IconBase d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />;
        const Package = () => <IconBase d="M16.5 9.4l-9-5.19M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16zM3.27 6.96L12 12.01l8.73-5.05M12 22.08V12" />;
        const Activity = () => <IconBase d="M22 12h-4l-3 9L9 3l-3 9H2" />;
        const TrendingUp = () => <IconBase d="M23 6l-9.5 9.5-5-5L1 18" />;
        const Plus = () => <IconBase d="M12 5v14M5 12h14" />;
        const FolderOpen = () => <IconBase d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />;
        const Users = () => <IconBase d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2 M23 21v-2a4 4 0 0 0-3-3.87 M16 3.13a4 4 0 0 1 0 7.75" />;
        const Printer = () => <IconBase d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z" />;
        const LogOut = () => <IconBase d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4 M16 17l5-5-5-5 M21 12H9" />;
        const GoogleIcon = () => (
            <svg className="w-5 h-5" viewBox="0 0 24 24">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
        );

        // --- 資料處理 ---
        const sanitizeProjects = (projects) => {
            if (!Array.isArray(projects)) return [];
            return projects.map(p => {
                let initialContracts = p.contracts || [];
                if (initialContracts.length === 0 && (p.contractQty || p.unitPrice)) {
                    initialContracts = [{ id: generateId(), name: '主合約', qty: (p.contractQty || '').toString(), price: (p.unitPrice || '').toString(), excludeQty: false }];
                } else if (initialContracts.length === 0) {
                    initialContracts = [{ id: generateId(), name: '材料合約', qty: '', price: '', excludeQty: false }];
                } else {
                    initialContracts = initialContracts.map(c => ({...c, excludeQty: c.excludeQty || false}));
                }

                let initialPayments = p.paymentRequests || [];
                initialPayments = initialPayments.map(pr => {
                    let base = { id: pr.id || generateId(), name: pr.name || '期款', excludeQty: pr.excludeQty || false };
                    if (pr.value !== undefined && pr.amount === undefined) {
                        const qty = pr.value.toString();
                        const amount = (parseNum(qty) * parseNum(p.unitPrice || 0)).toString();
                        return { ...base, qty: qty, amount: amount };
                    }
                    return { ...base, qty: pr.qty || '', amount: pr.amount || '' };
                });
                
                let initialShippingCosts = p.shippingCosts || [];
                if (initialShippingCosts.length === 0 && p.shippingCost) {
                    initialShippingCosts = [{ id: generateId(), name: '運費', value: p.shippingCost.toString() }];
                } else if (initialShippingCosts.length === 0) {
                    initialShippingCosts = [{ id: generateId(), name: '第一批運費', value: '' }];
                }

                const matType = p.matType || '3+';
                const rollArea = matType === '4+2' ? 75 : 50;

                // 處理舊版預估資料，平滑過渡到新版派工計畫
                let dispatchPlans = p.dispatchPlans;
                if (!dispatchPlans || dispatchPlans.length === 0) {
                    if (p.estimations && p.estimations.length > 0) {
                        dispatchPlans = p.estimations.map((est, idx) => {
                            const pArea = parseNum(est.projectedArea);
                            const wRate = parseNum(est.wasteRate) / 100;
                            const validRate = wRate >= 1 ? 0.99 : wRate;
                            const expectedTotalArea = pArea > 0 ? (pArea / (1 - validRate)) : 0;
                            const rolls = Math.ceil(expectedTotalArea / rollArea);
                            return {
                                id: est.id || generateId(),
                                name: est.name || `第 ${idx + 1} 批派工`,
                                area: est.projectedArea || '',
                                rolls: rolls > 0 ? rolls.toString() : ''
                            };
                        });
                    } else {
                        dispatchPlans = [{ id: generateId(), name: '第一批派工叫貨', area: '', rolls: '' }];
                    }
                }

                const blueprintArea = p.blueprintArea !== undefined ? p.blueprintArea.toString() : (p.projectedArea ? p.projectedArea.toString() : '');

                return {
                    ...p,
                    contracts: initialContracts,
                    paymentRequests: initialPayments,
                    deductions: (p.deductions || []).map(i => ({...i, id: i.id || generateId(), value: i.value || ''})),
                    deliveries: (p.deliveries || []).map(i => ({...i, id: i.id || generateId(), value: i.value || ''})),
                    subPayments: (p.subPayments || []).map(i => ({...i, id: i.id || generateId(), value: i.value || ''})),
                    dispatchPlans: dispatchPlans,
                    blueprintArea: blueprintArea,
                    shippingCosts: initialShippingCosts,
                    unusedInventory: p.unusedInventory?.toString() || '',
                    projectedArea: p.projectedArea?.toString() || '',
                    wallArea: p.wallArea?.toString() || '',
                    glueBuckets: p.glueBuckets?.toString() || '',
                    tapeWideRolls: p.tapeWideRolls?.toString() || '',
                    tapeNarrowRolls: p.tapeNarrowRolls?.toString() || '',
                    glueUnitPrice: p.glueUnitPrice?.toString() || '1680',
                    tapeWideUnitPrice: p.tapeWideUnitPrice?.toString() || '24.5',
                    tapeNarrowUnitPrice: p.tapeNarrowUnitPrice?.toString() || '38',
                    matType: matType,
                    matUnitPrice: p.matUnitPrice?.toString() || (matType === '4+2' ? '170' : '150'),
                    expectedWasteRate: p.expectedWasteRate?.toString() || '11',
                    estimateUpdatedAt: p.estimateUpdatedAt || Date.now(),
                };
            });
        };

        const createInitialState = (projectName = '新專案', userName = '未知使用者', uid = null) => ({
            projectName: projectName, 
            uid: uid,
            lastUpdatedBy: userName,
            contracts: [{ id: generateId(), name: '材料合約', qty: '', price: '', excludeQty: false }],
            paymentRequests: [{ id: generateId(), name: '第一期請款', qty: '', amount: '', excludeQty: false }],
            deductions: [{ id: generateId(), name: '清潔費', value: '' }, { id: generateId(), name: '保留款', value: '' }],
            deliveries: [{ id: generateId(), date: '', value: '' }],
            shippingCosts: [{ id: generateId(), name: '第一批運費', value: '' }],
            unusedInventory: '',
            projectedArea: '',
            wallArea: '',
            subPayments: [{ id: generateId(), value: '' }],
            glueBuckets: '',
            tapeWideRolls: '',
            tapeNarrowRolls: '',
            lastUpdated: Date.now(),
            glueUnitPrice: '1680',
            tapeWideUnitPrice: '24.5',
            tapeNarrowUnitPrice: '38',
            matType: '3+',  
            matUnitPrice: '150', 
            blueprintArea: '',
            expectedWasteRate: '11', 
            dispatchPlans: [{ id: generateId(), name: '第一批派工叫貨', area: '', rolls: '' }],
            estimateUpdatedAt: Date.now(), 
        });

        // --- 元件防護：中文輸入法 (IME) 專用 Input ---
        const SafeInput = React.forwardRef(({ value, onChange, ...props }, ref) => {
            const [localValue, setLocalValue] = useState(value || '');
            const isComposing = React.useRef(false);

            useEffect(() => {
                if (!isComposing.current && value !== localValue) {
                    setLocalValue(value || '');
                }
            }, [value]);

            const handleChange = (e) => {
                setLocalValue(e.target.value);
                if (!isComposing.current && onChange) {
                    onChange(e);
                }
            };

            const handleCompositionStart = () => {
                isComposing.current = true;
            };

            const handleCompositionEnd = (e) => {
                isComposing.current = false;
                if (onChange) onChange(e);
            };

            return (
                <input
                    {...props}
                    ref={ref}
                    value={localValue}
                    onChange={handleChange}
                    onCompositionStart={handleCompositionStart}
                    onCompositionEnd={handleCompositionEnd}
                />
            );
        });

        // --- 元件 ---
        const Card = ({ title, icon: Icon, children, className = "" }) => (
            <div className={`bg-surface rounded-xl shadow-sm border border-neutral-200 mb-6 transition-colors duration-300 ${className}`}>
                <div className="bg-neutral-50 px-6 py-4 border-b border-neutral-100 flex items-center gap-2 transition-colors duration-300 print:bg-transparent">
                    {Icon && <Icon className="text-primary-600 print:text-black" />}
                    <h2 className="font-bold text-lg text-neutral-800 transition-colors duration-300 print:text-black">{title}</h2>
                </div>
                <div className="p-6">{children}</div>
            </div>
        );

        const SectionHeader = ({ title }) => (
            <h3 className="text-sm font-semibold text-neutral-500 uppercase tracking-wider mb-3 mt-2 transition-colors duration-300">{title}</h3>
        );

        const TaxBreakdown = ({ amount, label = "含稅總額", colorClass = "text-neutral-800", totalColorClass = "text-secondary-700" }) => {
            const tax = Math.round(amount * 0.05);
            const total = amount + tax;
            return (
                <div className="mt-3 border-t border-neutral-200 pt-3 transition-colors duration-300 print-avoid-break">
                    <div className="flex justify-between text-xs text-neutral-500 mb-1 transition-colors duration-300">
                        <span>未稅金額:</span>
                        <span>{formatCurrency(amount)}</span>
                    </div>
                    <div className="flex justify-between text-xs text-neutral-500 mb-2 transition-colors duration-300">
                        <span>營業稅 (5%):</span>
                        <span>{formatCurrency(tax)}</span>
                    </div>
                    <div className={`flex justify-between text-base font-bold ${colorClass} transition-colors duration-300`}>
                        <span>{label}:</span>
                        <span className={totalColorClass}>{formatCurrency(total)}</span>
                    </div>
                </div>
            );
        };

        const InlineTax = ({ amount }) => {
            const tax = Math.round(amount * 0.05);
            const total = amount + tax;
            return (
                <div className="text-xs text-neutral-500 mt-1 flex justify-end gap-3 font-normal transition-colors duration-300">
                    <span>未稅: {formatCurrency(amount)}</span>
                    <span>稅: {formatCurrency(tax)}</span>
                    <span className="font-semibold text-neutral-700">含稅: {formatCurrency(total)}</span>
                </div>
            );
        };

        const SimpleInput = ({ label, value, onChange, type = "number", placeholder = "", suffix = "" }) => (
            <div className="mb-4 text-left">
                <label className="block text-sm font-medium text-neutral-700 mb-1 transition-colors duration-300">{label}</label>
                <div className="relative rounded-md shadow-sm">
                    <input
                        type={type}
                        value={value}
                        onChange={(e) => onChange(e.target.value)}
                        className="block w-full rounded-md border-neutral-300 pl-3 pr-12 py-2 focus:border-primary-500 focus:ring-primary-500 sm:text-sm border print-text-right bg-surface text-neutral-800 transition-colors duration-300"
                        placeholder={placeholder}
                        step="any"
                    />
                    {suffix && (
                        <div className="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none print:hidden">
                            <span className="text-neutral-500 sm:text-sm transition-colors duration-300">{suffix}</span>
                        </div>
                    )}
                </div>
            </div>
        );

        const DynamicListItem = ({ item, index, labelPrefix, valueField = "value", dateField, updateRow, onRemove }) => {
            return (
                <div className="flex flex-col gap-1 pb-3 border-b border-neutral-100 last:border-0 transition-colors duration-300 print-avoid-break">
                    <div className="flex gap-2 items-end text-left">
                        {dateField && (
                            <div className="w-1/3">
                                <label className="block text-xs text-neutral-500 mb-1 print:hidden transition-colors duration-300">日期</label>
                                <input
                                    type="date"
                                    value={item[dateField]}
                                    onChange={(e) => updateRow(item.id, dateField, e.target.value)}
                                    className="block w-full rounded-md border-neutral-300 py-2 px-2 text-sm border focus:ring-primary-500 focus:border-primary-500 bg-surface text-neutral-800 transition-colors duration-300"
                                />
                            </div>
                        )}
                        <div className="flex-1">
                            <label className="block text-xs text-neutral-500 mb-1 print:hidden transition-colors duration-300">{labelPrefix} {index + 1}</label>
                            <div className="flex items-center">
                                <span className="hidden print:inline-block mr-2 text-sm text-neutral-700">{labelPrefix} {index + 1}:</span>
                                <input
                                    type="number"
                                    value={item[valueField]}
                                    onChange={(e) => updateRow(item.id, valueField, e.target.value)}
                                    className="block w-full rounded-md border-neutral-300 py-2 px-3 text-sm border focus:ring-primary-500 focus:border-primary-500 bg-surface text-neutral-800 print-text-right transition-colors duration-300"
                                    placeholder="輸入未稅金額/數量"
                                />
                            </div>
                        </div>
                        <button onClick={() => onRemove(item.id)} className="mb-[2px] p-2 text-danger-500 hover:bg-danger-50 rounded-md transition-colors print:hidden">
                            <Trash2 />
                        </button>
                    </div>
                </div>
            );
        };

        const DynamicList = ({ items, onAdd, onRemove, onUpdate, ...props }) => (
            <div className="space-y-3 mb-4">
                {items.map((item, index) => (
                    <DynamicListItem key={item.id} item={item} index={index} updateRow={onUpdate} onRemove={onRemove} {...props} />
                ))}
                <button onClick={onAdd} className="flex items-center gap-1 text-sm text-primary-600 font-medium hover:text-primary-700 mt-2 print:hidden transition-colors duration-300">
                    <Plus /> 新增項目
                </button>
            </div>
        );

        const DeductionItem = ({ item, updateRow, onRemove, placeholder = "項目名稱" }) => { 
            return (
                <div className="flex gap-2 items-end mb-3 text-left print-avoid-break">
                    <div className="flex-1">
                        <label className="block text-xs text-neutral-500 mb-1 print:hidden transition-colors duration-300">名稱/備註</label>
                        <SafeInput
                            type="text"
                            value={item.name}
                            onChange={(e) => updateRow(item.id, 'name', e.target.value)}
                            className="block w-full rounded-md border-neutral-300 py-2 px-3 text-sm border focus:ring-primary-500 focus:border-primary-500 bg-surface text-neutral-800 transition-colors duration-300"
                            placeholder={placeholder}
                        />
                    </div>
                    <div className="w-1/3">
                        <label className="block text-xs text-neutral-500 mb-1 print:hidden transition-colors duration-300">未稅金額</label>
                        <input
                            type="number"
                            value={item.value}
                            onChange={(e) => updateRow(item.id, 'value', e.target.value)}
                            className="block w-full rounded-md border-neutral-300 py-2 px-3 text-sm border focus:ring-primary-500 focus:border-primary-500 bg-surface text-neutral-800 print-text-right transition-colors duration-300"
                        />
                    </div>
                    <button onClick={() => onRemove(item.id)} className="mb-[2px] p-2 text-danger-500 hover:bg-danger-50 rounded-md print:hidden">
                        <Trash2 />
                    </button>
                </div>
            );
        };

        const LoginScreen = ({ onLogin, error }) => (
            <div className="min-h-screen login-bg flex flex-col items-center justify-center p-4">
                <div className="bg-surface rounded-2xl shadow-xl p-8 w-full max-w-md text-center transition-colors duration-300">
                    <div className="bg-primary-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-6 transition-colors duration-300">
                        <Calculator className="text-primary-600" />
                    </div>
                    <h1 className="text-2xl font-bold text-neutral-800 mb-2 transition-colors duration-300">隔音墊施工計算</h1>
                    <p className="text-neutral-500 mb-2 transition-colors duration-300">雲端協作版</p>
                    <p className="text-xs text-neutral-400 mb-6 transition-colors duration-300">資料將與團隊即時同步</p>
                    
                    {error && (
                        <div className="mb-6 p-3 bg-danger-50 text-danger-600 border border-danger-200 text-xs rounded-lg text-left break-words transition-colors duration-300">
                            {error.includes('unauthorized-domain') 
                                ? '此網域未經 Firebase 授權。若要在此預覽，請至 Firebase 後台 (Authentication > Settings > Authorized domains) 將目前網域加入白名單。' 
                                : error}
                        </div>
                    )}
                    
                    <button 
                        onClick={onLogin}
                        className="w-full flex items-center justify-center gap-3 bg-surface border border-neutral-300 text-neutral-700 font-semibold py-3 px-4 rounded-lg hover:bg-surface-hover transition-colors shadow-sm"
                    >
                        <GoogleIcon />
                        使用 Google 帳號登入
                    </button>
                </div>
            </div>
        );

        window.SoundproofingCalculator = function SoundproofingCalculator() {
            const [user, setUser] = useState(null);
            const [loadingAuth, setLoadingAuth] = useState(true);
            const [authError, setAuthError] = useState('');
            const [projects, setProjects] = useState([]);
            const [currentProjectId, setCurrentProjectId] = useState(null);
            const [tempProjectName, setTempProjectName] = useState(''); 
            
            // 主題狀態管理
            const [theme, setTheme] = useState(() => localStorage.getItem('app-theme') || 'default');

            useEffect(() => {
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('app-theme', theme);
            }, [theme]);

            // 身分驗證監聽
            useEffect(() => {
                const unsubscribe = window.auth.onAuthStateChanged(currentUser => {
                    setUser(currentUser);
                    setLoadingAuth(false);
                });
                return () => unsubscribe();
            }, []);

            const handleLogin = () => {
                setAuthError('');
                const provider = new firebase.auth.GoogleAuthProvider();
                window.auth.signInWithPopup(provider).catch(error => {
                    console.error("登入失敗:", error);
                    setAuthError(error.message);
                });
            };

            const handleLogout = () => {
                window.auth.signOut();
                setProjects([]); 
                setCurrentProjectId(null);
            };

            // Firestore 資料即時監聽
            useEffect(() => {
                if (!user) return;

                const unsubscribe = window.db.collection('projects')
                    .orderBy('lastUpdated', 'desc')
                    .onSnapshot(snapshot => {
                        const loadedProjects = snapshot.docs.map(doc => ({
                            id: doc.id,
                            ...doc.data()
                        }));
                        const sanitized = sanitizeProjects(loadedProjects);
                        setProjects(sanitized);

                        if (sanitized.length > 0) {
                            setCurrentProjectId(prevId => {
                                if (!prevId || !sanitized.find(p => p.id === prevId)) {
                                    return sanitized[0].id;
                                }
                                return prevId;
                            });
                        }
                    }, error => {
                        console.error("Firestore 監聽失敗:", error);
                    });

                return () => unsubscribe(); 
            }, [user]); 

            // 雲端更新共用函數
            const updateToFirestore = useCallback((docId, data) => {
                if (!user) return;
                window.db.collection('projects').doc(docId).update({ 
                    ...data, 
                    lastUpdated: Date.now(),
                    lastUpdatedBy: getUserName(user)
                }).catch(error => console.error(`更新失敗:`, error));
            }, [user]);

            // CRUD 操作
            const handleCreateProject = useCallback((name = `新專案 ${projects.length + 1}`) => {
                if (!user) return;
                const newProjectData = createInitialState(name, getUserName(user), user.uid);
                window.db.collection('projects').add(newProjectData)
                    .then(docRef => {
                        setCurrentProjectId(docRef.id);
                    })
                    .catch(error => console.error("新增專案失敗:", error));
            }, [projects.length, user]);

            const handleDeleteProject = (id) => {
                if (!confirm("確定要刪除此專案嗎？刪除後無法復原，其他人也將看不到此專案。")) return;
                window.db.collection('projects').doc(id).delete()
                    .catch(error => console.error("刪除專案失敗:", error));
            };

            const updateProjectField = useCallback((field, value) => {
                if (!currentProjectId) return;
                updateToFirestore(currentProjectId, { [field]: value });
            }, [currentProjectId, updateToFirestore]);

            const updateListField = useCallback((listName, itemId, field, value) => {
                const projectToUpdate = projects.find(p => p.id === currentProjectId);
                if (!projectToUpdate) return;
                const currentList = Array.isArray(projectToUpdate[listName]) ? projectToUpdate[listName] : [];
                const updatedList = currentList.map(item => 
                    item.id === itemId ? { ...item, [field]: value } : item
                );
                updateToFirestore(currentProjectId, { [listName]: updatedList });
            }, [currentProjectId, projects, updateToFirestore]);

            const addListItem = useCallback((listName, newItem) => {
                const projectToUpdate = projects.find(p => p.id === currentProjectId);
                if (!projectToUpdate) return;
                const currentList = Array.isArray(projectToUpdate[listName]) ? projectToUpdate[listName] : [];
                const updatedList = [...currentList, { ...newItem, id: generateId() }];
                updateToFirestore(currentProjectId, { [listName]: updatedList });
            }, [currentProjectId, projects, updateToFirestore]);

            const removeListItem = useCallback((listName, itemId) => {
                const projectToUpdate = projects.find(p => p.id === currentProjectId);
                if (!projectToUpdate) return;
                const currentList = Array.isArray(projectToUpdate[listName]) ? projectToUpdate[listName] : [];
                const updatedList = currentList.filter(i => i.id !== itemId);
                updateToFirestore(currentProjectId, { [listName]: updatedList });
            }, [currentProjectId, projects, updateToFirestore]);

            const currentProject = useMemo(() => {
                if (projects.length === 0) return createInitialState('載入中...', '系統');
                return projects.find(p => p.id === currentProjectId) || projects[0];
            }, [projects, currentProjectId]);

            useEffect(() => {
                setTempProjectName(currentProject.projectName);
            }, [currentProject.projectName]); 

            useEffect(() => {
                if (!currentProjectId || tempProjectName === currentProject.projectName) return;
                const handler = setTimeout(() => {
                    updateProjectField('projectName', tempProjectName);
                }, 500);
                return () => clearTimeout(handler);
            }, [tempProjectName, currentProject.projectName, currentProjectId, updateProjectField]);

            const handlePrint = () => {
                const today = new Date();
                const yyyy = today.getFullYear();
                const mm = String(today.getMonth() + 1).padStart(2, '0');
                const dd = String(today.getDate()).padStart(2, '0');
                const dateStr = `${yyyy}${mm}${dd}`;
                const safeProjectName = currentProject.projectName.replace(/[/\\?%*:|"<>]/g, '-');
                const fileName = `${dateStr}_${safeProjectName}`;
                
                const originalTitle = document.title;
                document.title = fileName;
                window.print();
                document.title = originalTitle;
            };

            if (loadingAuth) {
                return <div className="min-h-screen flex items-center justify-center text-neutral-500 bg-neutral-50 transition-colors duration-300">載入中...</div>;
            }

            if (!user) {
                return <LoginScreen onLogin={handleLogin} error={authError} />;
            }

            if (projects.length === 0) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4 bg-neutral-50 transition-colors duration-300">
                        <div className="text-neutral-500 mb-4 transition-colors duration-300">雲端尚未建立任何專案</div>
                        <button onClick={() => handleCreateProject()} className="bg-primary-600 text-primary-50 px-4 py-2 rounded transition-colors duration-300 hover:bg-primary-700">建立第一個專案</button>
                        <button onClick={handleLogout} className="mt-4 text-sm text-neutral-400 underline transition-colors duration-300">登出</button>
                    </div>
                );
            }

            const { 
                projectName, contracts, paymentRequests, deductions, 
                deliveries, unusedInventory, projectedArea, wallArea, 
                subPayments, glueBuckets, tapeWideRolls, tapeNarrowRolls, shippingCosts,
                glueUnitPrice, tapeWideUnitPrice, tapeNarrowUnitPrice,
                matType, matUnitPrice, blueprintArea, expectedWasteRate, dispatchPlans,
                estimateUpdatedAt, lastUpdated, lastUpdatedBy
            } = currentProject;

            const ROLL_AREA = matType === '4+2' ? 75 : 50; 

            // 第一大項：合約總計 (有勾選排除數量的，只算金額不算坪數)
            const totalContractQty = contracts.reduce((sum, c) => c.excludeQty ? sum : sum + parseNum(c.qty), 0);
            const totalContractAmount = contracts.reduce((sum, c) => sum + (parseNum(c.qty) * parseNum(c.price)), 0);
            
            // 第一大項：請款總計 (有勾選排除數量的，只算金額不算坪數)
            const totalPaymentQty = paymentRequests.reduce((sum, pr) => pr.excludeQty ? sum : sum + parseNum(pr.qty), 0);
            const totalPaymentAmount = paymentRequests.reduce((sum, pr) => sum + parseNum(pr.amount), 0);
            
            const remainingContractQty = totalContractQty - totalPaymentQty;
            const remainingContractAmount = totalContractAmount - totalPaymentAmount;
            const totalDeductionAmount = deductions.reduce((sum, curr) => sum + parseNum(curr.value), 0);
            
            // 處理追加與超請的顯示邏輯 (絕對值轉換)
            const isOverContractQty = remainingContractQty < 0;
            const isOverContractAmount = remainingContractAmount < 0;
            const absRemainingQty = Math.abs(remainingContractQty);
            const absRemainingAmount = Math.abs(remainingContractAmount);
            const absRemainingTax = Math.round(absRemainingAmount * 0.05);
            const absRemainingTotal = absRemainingAmount + absRemainingTax;

            // 第二大項
            const totalDelivered = deliveries.reduce((acc, curr) => acc + parseNum(curr.value), 0);
            const totalUsedInventory = totalDelivered - parseNum(unusedInventory);
            
            // 第三大項
            const totalArea = totalUsedInventory * ROLL_AREA;
            const totalProjectArea = parseNum(projectedArea) + parseNum(wallArea);
            const wasteAreaDisplay = Math.max(0, totalProjectArea > 0 ? totalArea - totalProjectArea : 0);
            const calculatedWasteRate = totalArea > 0 ? ((parseNum(wallArea) + wasteAreaDisplay) / totalArea) * 100 : 0;
            
            // 第四大項：派工規劃與檢核
            const baseArea = parseNum(blueprintArea);
            const baseRate = parseNum(expectedWasteRate) / 100;
            const validBaseRate = baseRate >= 1 ? 0.99 : baseRate; 
            const baseTotalArea = baseArea > 0 ? (baseArea / (1 - validBaseRate)) : 0;
            const baseTotalRollsFloat = baseTotalArea / ROLL_AREA;
            const baseTotalRollsCeil = Math.ceil(baseTotalRollsFloat); 

            const totalDispatchedRolls = dispatchPlans.reduce((sum, item) => sum + parseNum(item.rolls), 0);
            
            const remainingDispatchBudget = baseTotalRollsCeil - totalDispatchedRolls;
            const needToOrder = totalDispatchedRolls - totalDelivered;

            // 第五大項
            const totalSubPayment = subPayments.reduce((acc, curr) => acc + parseNum(curr.value), 0);
            const totalShippingCost = shippingCosts.reduce((sum, curr) => sum + parseNum(curr.value), 0);
            const totalConsumablesCost = (parseNum(glueBuckets) * parseNum(glueUnitPrice)) + (parseNum(tapeWideRolls) * parseNum(tapeWideUnitPrice)) + (parseNum(tapeNarrowRolls) * parseNum(tapeNarrowUnitPrice));
            const matTotalCost = totalArea * parseNum(matUnitPrice); 
            
            const totalCost = totalSubPayment + totalConsumablesCost + totalDeductionAmount + matTotalCost + totalShippingCost;
            const totalTaxableCost = totalSubPayment + totalShippingCost + totalDeductionAmount + matTotalCost;
            const totalCostTax = Math.round(totalTaxableCost * 0.05);
            
            // 第六大項
            const grossProfit = totalPaymentAmount - totalCost; 
            const grossMargin = totalPaymentAmount > 0 ? (grossProfit / totalPaymentAmount) * 100 : 0;

            return (
                <div className="max-w-4xl mx-auto pb-20 p-4 sm:p-6 text-center">
                    <header className="mb-6 flex flex-col md:flex-row justify-between items-center gap-4 print:hidden">
                        <div className="flex items-center gap-3">
                            <div className="bg-accent-100 p-2 rounded-full transition-colors duration-300 print:hidden"><Users className="text-accent-600"/></div>
                            <div className="text-left">
                                <h1 className="text-2xl font-bold text-neutral-800 transition-colors duration-300">隔音墊施工計算</h1>
                                <p className="text-xs text-neutral-500 mt-1 transition-colors duration-300">
                                    雲端協作模式 • {getUserName(user)}
                                </p>
                            </div>
                        </div>
                        <div className="flex items-center gap-2 print:hidden">
                            {/* 主題切換器 */}
                            <select 
                                value={theme}
                                onChange={(e) => setTheme(e.target.value)}
                                className="text-sm border-neutral-300 rounded-full bg-surface text-neutral-700 py-1.5 px-3 border shadow-sm focus:ring-primary-500 focus:border-primary-500 outline-none cursor-pointer transition-colors duration-300"
                            >
                                <option value="default">經典藍</option>
                                <option value="warm">晨峰橘</option>
                                <option value="eco">環保綠</option>
                                <option value="dark">暗黑模式</option>
                            </select>

                            <button onClick={handlePrint} className="text-sm flex items-center gap-1 text-primary-600 border border-primary-200 px-3 py-1.5 rounded-full hover:bg-primary-50 transition-colors duration-300">
                                <Printer size={16} /> 匯出 PDF
                            </button>
                            <button onClick={handleLogout} className="text-sm flex items-center gap-1 text-neutral-500 hover:text-neutral-800 border border-neutral-200 px-3 py-1.5 rounded-full hover:bg-surface-hover transition-colors duration-300">
                                <LogOut size={16} /> 登出
                            </button>
                        </div>
                    </header>
                    
                    <div className="flex flex-col md:flex-row gap-3 items-start md:items-center bg-surface p-4 rounded-lg shadow-sm border border-neutral-200 mb-6 transition-colors duration-300 print:hidden">
                        <div className="flex items-center gap-2 w-full md:w-auto">
                            <FolderOpen className="text-accent-600" />
                            <label className="text-sm font-semibold text-neutral-700 transition-colors duration-300">切換專案:</label>
                        </div>
                        <select 
                            className="flex-grow p-2 border border-neutral-300 rounded-md shadow-sm w-full md:w-auto bg-surface text-neutral-800 focus:ring-primary-500 focus:border-primary-500 transition-colors duration-300"
                            value={currentProjectId || ''}
                            onChange={(e) => setCurrentProjectId(e.target.value)}
                        >
                            {projects.map(p => (
                                <option key={p.id} value={p.id}>
                                    {p.projectName} {p.lastUpdatedBy ? `(${p.lastUpdatedBy})` : ''}
                                </option>
                            ))}
                        </select>
                        <div className="flex gap-2 mt-2 md:mt-0 w-full md:w-auto justify-end">
                            <button onClick={() => handleCreateProject()} className="flex items-center gap-1 text-sm bg-primary-500 text-primary-50 px-3 py-2 rounded hover:bg-primary-600 shadow-sm transition-colors duration-300"><Plus size={16}/> 新增</button>
                            <button onClick={() => handleDeleteProject(currentProjectId)} className="flex items-center gap-1 text-sm bg-surface border border-danger-200 text-danger-500 px-3 py-2 rounded hover:bg-danger-50 transition-colors duration-300"><Trash2 size={16}/> 刪除</button>
                        </div>
                    </div>

                    <div className="bg-surface rounded-xl shadow p-6 mb-6 border border-neutral-200 relative text-left transition-colors duration-300">
                        <div className="absolute top-4 right-4 text-xs text-neutral-400 transition-colors duration-300 print:hidden">
                            最後編輯: {lastUpdatedBy} ({new Date(lastUpdated).toLocaleString()})
                        </div>
                        <div className="mb-4 pb-4 border-b border-neutral-100 transition-colors duration-300">
                            <label className="block text-xs font-bold text-neutral-400 uppercase tracking-wider mb-1 transition-colors duration-300 print:hidden">專案名稱</label>
                            <SafeInput 
                                type="text" 
                                value={tempProjectName} 
                                onChange={(e) => setTempProjectName(e.target.value)} 
                                className="block w-full rounded border-0 border-b-2 border-neutral-200 p-0 py-1 text-xl font-bold focus:ring-0 focus:border-primary-500 transition-colors print:text-2xl print:border-none print:text-center bg-surface text-neutral-800 duration-300" 
                                placeholder="輸入專案名稱..." 
                            />
                        </div>
                        
                        <div className="w-full grid grid-cols-1 md:grid-cols-2 gap-6 bg-secondary-50 p-4 rounded-lg border border-secondary-100 print:bg-transparent print:border-neutral-300 print:p-2 transition-colors duration-300">
                            <div className="text-sm text-left">
                                <label className="block text-sm text-secondary-800 mb-1 font-bold transition-colors duration-300">隔音墊規格 (捲數換算基準)</label>
                                <select 
                                    value={matType} 
                                    onChange={(e) => {
                                        const newType = e.target.value;
                                        updateProjectField('matType', newType);
                                        updateProjectField('matUnitPrice', newType === '4+2' ? '170' : '150');
                                    }}
                                    className="block w-full rounded-md border-secondary-200 py-2 px-3 text-sm border focus:ring-secondary-500 focus:border-secondary-500 bg-surface shadow-sm font-semibold text-neutral-800 transition-colors duration-300"
                                >
                                    <option value="3+">普渼登 3+ (50 m²/卷)</option>
                                    <option value="4+2">普渼登 4+2 (75 m²/卷)</option>
                                </select>
                            </div>
                            <div className="text-sm text-left">
                                <label className="block text-sm text-secondary-800 mb-1 font-bold transition-colors duration-300">隔音墊單價 (未稅)</label>
                                <input 
                                    type="number" 
                                    value={matUnitPrice} 
                                    onChange={(e) => updateProjectField('matUnitPrice', e.target.value)} 
                                    className="block w-full rounded-md border-secondary-200 py-2 px-3 text-sm border focus:ring-secondary-500 focus:border-secondary-500 shadow-sm print-text-right font-semibold bg-surface text-neutral-800 transition-colors duration-300" 
                                    placeholder="未稅單價" 
                                />
                            </div>
                        </div>
                    </div>

                    <div className="space-y-6">
                        {/* 1. 合約與請款 */}
                        <Card title="第一大項：合約總覽與請款進度" icon={DollarSign}>
                            <div className="grid md:grid-cols-2 gap-8">
                                <div>
                                    <SectionHeader title="合約明細結構 (未稅)" />
                                    <div className="space-y-3 mb-4">
                                        {contracts.map((c, index) => (
                                            <div key={c.id} className="flex gap-2 items-start pb-3 border-b border-neutral-100 transition-colors duration-300 print-avoid-break">
                                                <div className="flex-1">
                                                    <label className="block text-xs text-neutral-500 mb-1 transition-colors duration-300 print:hidden">項目名稱</label>
                                                    <SafeInput type="text" value={c.name} onChange={(e) => updateListField('contracts', c.id, 'name', e.target.value)} className="block w-full rounded-md border-neutral-300 py-1.5 px-2 text-sm border focus:ring-primary-500 focus:border-primary-500 bg-surface text-neutral-800 print:font-bold transition-colors duration-300" placeholder="如: 材料 / 施工" />
                                                </div>
                                                <div className="w-24">
                                                    <label className="block text-xs text-neutral-500 mb-1 transition-colors duration-300 print:hidden">數量(m²)</label>
                                                    <input type="number" value={c.qty} onChange={(e) => updateListField('contracts', c.id, 'qty', e.target.value)} className="block w-full rounded-md border-neutral-300 py-1.5 px-2 text-sm border focus:ring-primary-500 focus:border-primary-500 bg-surface text-neutral-800 print-text-right transition-colors duration-300" placeholder="數量" />
                                                    <label className="flex items-center gap-1 mt-1 text-[10px] text-neutral-400 cursor-pointer print:hidden hover:text-primary-600 transition-colors">
                                                        <input type="checkbox" checked={!c.excludeQty} onChange={(e) => updateListField('contracts', c.id, 'excludeQty', !e.target.checked)} className="rounded border-neutral-300 text-primary-500 focus:ring-primary-500 w-3 h-3 cursor-pointer" />
                                                        計入總數
                                                    </label>
                                                </div>
                                                <div className="w-24">
                                                    <label className="block text-xs text-neutral-500 mb-1 transition-colors duration-300 print:hidden">未稅單價</label>
                                                    <input type="number" value={c.price} onChange={(e) => updateListField('contracts', c.id, 'price', e.target.value)} className="block w-full rounded-md border-neutral-300 py-1.5 px-2 text-sm border focus:ring-primary-500 focus:border-primary-500 bg-surface text-neutral-800 print-text-right transition-colors duration-300" placeholder="單價" />
                                                </div>
                                                <div className="mt-[22px]">
                                                    <button onClick={() => removeListItem('contracts', c.id)} className="p-1.5 text-danger-500 hover:bg-danger-50 rounded-md transition-colors duration-300 print:hidden"><Trash2 /></button>
                                                </div>
                                            </div>
                                        ))}
                                        <button onClick={() => addListItem('contracts', { name: '', qty: '', price: '', excludeQty: false })} className="flex items-center gap-1 text-sm text-primary-600 font-medium hover:text-primary-700 mt-2 transition-colors duration-300 print:hidden"><Plus /> 新增合約項目</button>
                                    </div>
                                    
                                    <div className="bg-neutral-50 p-4 rounded-lg border border-neutral-200 transition-colors duration-300 print:bg-transparent">
                                        <div className="flex justify-between text-sm text-neutral-600 mb-1 transition-colors duration-300">
                                            <span>合約總數量:</span>
                                            <span className="font-bold">{formatNumber(totalContractQty)} m²</span>
                                        </div>
                                        <TaxBreakdown amount={totalContractAmount} label="合約總額 (含稅)" />
                                    </div>
                                </div>

                                <div>
                                    <SectionHeader title="實際請款進度 (未稅)" />
                                    <div className="space-y-3 mb-4">
                                        {paymentRequests.map((pr, index) => (
                                            <div key={pr.id} className="flex gap-2 items-start pb-3 border-b border-neutral-100 transition-colors duration-300 print-avoid-break">
                                                <div className="flex-1">
                                                    <label className="block text-xs text-neutral-500 mb-1 transition-colors duration-300 print:hidden">期數/說明</label>
                                                    <SafeInput type="text" value={pr.name} onChange={(e) => updateListField('paymentRequests', pr.id, 'name', e.target.value)} className="block w-full rounded-md border-neutral-300 py-1.5 px-2 text-sm border focus:ring-primary-500 focus:border-primary-500 bg-surface text-neutral-800 transition-colors duration-300" placeholder="如: 第一期" />
                                                </div>
                                                <div className="w-24">
                                                    <label className="block text-xs text-neutral-500 mb-1 transition-colors duration-300 print:hidden">數量(m²)</label>
                                                    <input type="number" value={pr.qty} onChange={(e) => updateListField('paymentRequests', pr.id, 'qty', e.target.value)} className="block w-full rounded-md border-neutral-300 py-1.5 px-2 text-sm border focus:ring-primary-500 focus:border-primary-500 bg-surface text-neutral-800 print-text-right transition-colors duration-300" placeholder="數量" />
                                                    <label className="flex items-center gap-1 mt-1 text-[10px] text-neutral-400 cursor-pointer print:hidden hover:text-primary-600 transition-colors">
                                                        <input type="checkbox" checked={!pr.excludeQty} onChange={(e) => updateListField('paymentRequests', pr.id, 'excludeQty', !e.target.checked)} className="rounded border-neutral-300 text-primary-500 focus:ring-primary-500 w-3 h-3 cursor-pointer" />
                                                        計入總數
                                                    </label>
                                                </div>
                                                <div className="w-28">
                                                    <label className="block text-xs text-neutral-500 mb-1 transition-colors duration-300 print:hidden">未稅金額</label>
                                                    <input type="number" value={pr.amount} onChange={(e) => updateListField('paymentRequests', pr.id, 'amount', e.target.value)} className="block w-full rounded-md border-neutral-300 py-1.5 px-2 text-sm border focus:ring-primary-500 focus:border-primary-500 bg-surface text-neutral-800 print-text-right transition-colors duration-300" placeholder="金額" />
                                                </div>
                                                <div className="mt-[22px]">
                                                    <button onClick={() => removeListItem('paymentRequests', pr.id)} className="p-1.5 text-danger-500 hover:bg-danger-50 rounded-md transition-colors duration-300 print:hidden"><Trash2 /></button>
                                                </div>
                                            </div>
                                        ))}
                                        <button onClick={() => addListItem('paymentRequests', { name: '', qty: '', amount: '', excludeQty: false })} className="flex items-center gap-1 text-sm text-primary-600 font-medium hover:text-primary-700 mt-2 transition-colors duration-300 print:hidden"><Plus /> 新增請款期數</button>
                                    </div>

                                    <div className="bg-primary-50 p-4 rounded-lg border border-primary-100 print:bg-transparent print:border-neutral-200 transition-colors duration-300 print-avoid-break">
                                        <div className="flex justify-between text-sm text-primary-800 mb-1 transition-colors duration-300 print:text-black">
                                            <span>累積請款數量:</span>
                                            <span className="font-bold">{formatNumber(totalPaymentQty)} m²</span>
                                        </div>
                                        <TaxBreakdown amount={totalPaymentAmount} label="累積已請款 (含稅)" colorClass="text-primary-900" totalColorClass="text-primary-700" />
                                    </div>
                                </div>
                            </div>
                            
                            <div className="mt-6 pt-4 border-t border-neutral-200 transition-colors duration-300 print-avoid-break">
                                <div className="flex flex-col md:flex-row justify-between items-center gap-4 bg-neutral-800 text-neutral-50 p-4 rounded-lg print:bg-transparent print:border print:border-neutral-300 transition-colors duration-300">
                                    <div className="flex items-center gap-2">
                                        <span className="font-semibold">
                                            {isOverContractAmount ? '合約追加 / 超請餘額：' : '合約未請款餘額：'}
                                        </span>
                                    </div>
                                    <div className="flex gap-6 text-right">
                                        <div>
                                            <div className="text-xs text-neutral-400 transition-colors duration-300">
                                                {isOverContractQty ? '追加/超請數量' : '剩餘數量'}
                                            </div>
                                            <div className={`text-xl font-bold ${isOverContractQty ? 'text-warning-400' : 'text-neutral-100 print:text-black'} transition-colors duration-300`}>
                                                {isOverContractQty ? `+${formatNumber(absRemainingQty)}` : formatNumber(remainingContractQty)} m²
                                            </div>
                                        </div>
                                        <div>
                                            <div className="text-xs text-neutral-400 transition-colors duration-300">
                                                {isOverContractAmount ? '追加/超請未稅金額' : '剩餘未稅金額'}
                                            </div>
                                            <div className={`text-2xl font-mono font-bold ${isOverContractAmount ? 'text-warning-400' : 'text-success-400 print:text-black'} transition-colors duration-300`}>
                                                {isOverContractAmount ? `+${formatCurrency(absRemainingAmount)}` : formatCurrency(remainingContractAmount)}
                                            </div>
                                            <div className="text-[10px] text-neutral-400 mt-1 transition-colors duration-300">
                                                含稅: {formatCurrency(absRemainingTotal)}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="mt-6 border-t border-neutral-200 pt-4 transition-colors duration-300 print-avoid-break">
                                <SectionHeader title="扣款項目 (未稅)" />
                                {deductions.map(item => (
                                    <DeductionItem 
                                        key={item.id} item={item} 
                                        placeholder="例如: 清潔費"
                                        updateRow={(id, f, v) => updateListField('deductions', id, f, v)}
                                        onRemove={(id) => removeListItem('deductions', id)}
                                    />
                                ))}
                                <button onClick={() => addListItem('deductions', { name: '', value: '' })} className="flex items-center gap-1 text-sm text-primary-600 mt-2 transition-colors duration-300 print:hidden"><Plus size={16}/> 新增扣款</button>
                                <div className="text-right text-sm mt-3 pt-3 border-t border-neutral-100 transition-colors duration-300">
                                    <div className="font-bold text-danger-600 transition-colors duration-300">扣款總計 (未稅): -{formatCurrency(totalDeductionAmount)}</div>
                                    <InlineTax amount={totalDeductionAmount} />
                                </div>
                            </div>
                        </Card>

                        {/* 2. 進貨 */}
                        <Card title="第二大項：進貨與庫存" icon={Package} className="print-page-break">
                            <div className="grid md:grid-cols-2 gap-6">
                                <div>
                                    <SectionHeader title="進貨紀錄 (卷)" />
                                    <DynamicList 
                                        items={deliveries} 
                                        onAdd={() => addListItem('deliveries', { date: '', value: '' })}
                                        onRemove={(id) => removeListItem('deliveries', id)}
                                        onUpdate={(id, f, v) => updateListField('deliveries', id, f, v)}
                                        valueField="value"
                                        labelPrefix="進貨" dateField="date" 
                                    />
                                    <div className="text-sm font-bold text-neutral-700 bg-neutral-50 p-2 rounded text-left print:bg-transparent print:border print:border-neutral-200 transition-colors duration-300 print-avoid-break">累積進貨: {formatNumber(totalDelivered)}</div>
                                </div>
                                <div>
                                    <SectionHeader title="現場盤點" />
                                    <SimpleInput label="未使用數量 (卷)" value={unusedInventory} onChange={(v) => updateProjectField('unusedInventory', v)} />
                                    <div className="bg-warning-50 p-4 rounded-lg mt-4 text-left print:bg-transparent print:border print:border-neutral-200 transition-colors duration-300 print-avoid-break">
                                        <div className="text-sm text-warning-800 font-semibold mb-1 transition-colors duration-300 print:text-black">實際使用量</div>
                                        <div className="text-2xl font-bold text-warning-600 transition-colors duration-300 print:text-black">{formatNumber(totalUsedInventory)}</div>
                                    </div>
                                </div>
                            </div>
                        </Card>

                        {/* 3. 實際損耗 */}
                        <Card title="第三大項：面積與實際損耗" icon={Activity} className="print-page-break">
                            <div className="grid md:grid-cols-4 gap-4 mb-4 print-avoid-break">
                                <SimpleInput label="投影面積" value={projectedArea} onChange={(v) => updateProjectField('projectedArea', v)} />
                                <SimpleInput label="上牆面積" value={wallArea} onChange={(v) => updateProjectField('wallArea', v)} />
                                <div className="mb-4 text-left">
                                    <label className="block text-sm font-medium text-neutral-700 mb-1 transition-colors duration-300">總面積 (供料)</label>
                                    <div className="bg-neutral-50 border border-neutral-200 p-2 rounded text-lg font-bold text-primary-700 print:bg-transparent transition-colors duration-300 print:text-black">{formatNumber(totalArea)}</div>
                                </div>
                                <div className="mb-4 text-left">
                                    <label className="block text-sm font-medium text-neutral-700 mb-1 transition-colors duration-300">剩餘損耗 (殘料)</label>
                                    <div className="bg-neutral-50 border border-neutral-200 p-2 rounded text-lg font-bold text-warning-600 print:bg-transparent transition-colors duration-300 print:text-black">{formatNumber(wasteAreaDisplay)}</div>
                                </div>
                            </div>

                            <div className="bg-neutral-800 text-neutral-50 rounded-lg flex flex-col md:flex-row justify-between items-center gap-2 p-4 print:bg-transparent print:border print:border-neutral-300 transition-colors duration-300 print-avoid-break">
                                <div className="flex items-center gap-2">
                                    <span className="font-semibold print:text-black">總損耗率結果：</span>
                                    <span className="text-xs bg-neutral-700 px-2 py-1 rounded text-neutral-400 print:bg-transparent print:border print:border-neutral-200 transition-colors duration-300 print:text-black">含上牆與殘料</span>
                                </div>
                                <span className="text-3xl font-mono text-warning-400 print:text-black">{calculatedWasteRate.toFixed(2)}%</span>
                            </div>
                        </Card>

                        {/* 4. 預估備料 */}
                        <Card title="第四大項：專案備料總預估與派工檢核" icon={FolderOpen} className="print-page-break">
                            
                            {/* Part 1: 預估總基準 */}
                            <div className="mb-8 text-left">
                                <SectionHeader title="1. 全案圖面預估基準 (設定總預算)" />
                                <div className="flex flex-col md:flex-row gap-4 bg-secondary-50 p-4 rounded-lg border border-secondary-100 print:bg-transparent print:border-neutral-200 transition-colors duration-300 print-avoid-break">
                                    <div className="w-full md:w-1/3">
                                        <label className="block text-xs text-secondary-600 mb-1 font-semibold transition-colors duration-300 print:text-black">圖面總投影面積 (m²)</label>
                                        <SafeInput 
                                            type="number" 
                                            value={blueprintArea} 
                                            onChange={(e) => updateProjectField('blueprintArea', e.target.value)} 
                                            className="block w-full rounded-md border-secondary-200 py-2 px-3 text-sm focus:ring-secondary-500 focus:border-secondary-500 bg-surface text-neutral-800 transition-colors duration-300" 
                                            placeholder="請輸入圖面面積"
                                        />
                                    </div>
                                    <div className="w-full md:w-1/3">
                                        <label className="block text-xs text-secondary-600 mb-1 font-semibold transition-colors duration-300 print:text-black">設定全案目標損耗率 (%)</label>
                                        <SafeInput 
                                            type="number" 
                                            value={expectedWasteRate} 
                                            onChange={(e) => updateProjectField('expectedWasteRate', e.target.value)} 
                                            className="block w-full rounded-md border-secondary-200 py-2 px-3 text-sm focus:ring-secondary-500 focus:border-secondary-500 bg-surface text-neutral-800 transition-colors duration-300" 
                                            placeholder="如: 11"
                                        />
                                    </div>
                                    <div className="w-full md:w-1/3 flex flex-col justify-end md:text-right mt-2 md:mt-0">
                                        <div className="text-[10px] text-neutral-500 mb-0.5 transition-colors duration-300 print:text-black">
                                            依 {formatNumber(baseArea)} ÷ (1 - {expectedWasteRate}%) 反推
                                        </div>
                                        <div className="text-lg font-bold text-secondary-700 transition-colors duration-300 print:text-black">
                                            目標總需求： <span className="text-2xl">{baseTotalRollsCeil}</span> <span className="text-sm font-normal">卷</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Part 2: 分批派工單 */}
                            <div className="mb-6 text-left border-t border-neutral-200 pt-5 transition-colors duration-300">
                                <SectionHeader title="2. 工班分批派工與叫貨申請" />
                                <div className="space-y-3">
                                    {dispatchPlans.map((plan, index) => (
                                        <div key={plan.id} className="flex flex-col md:flex-row gap-3 items-end bg-surface p-3 rounded-lg border border-neutral-200 print:bg-transparent transition-colors duration-300 print-avoid-break">
                                            <div className="w-full md:flex-1">
                                                <label className="block text-xs text-neutral-500 mb-1 transition-colors duration-300 print:hidden">派工/叫貨批次</label>
                                                <SafeInput type="text" value={plan.name} onChange={(e) => updateListField('dispatchPlans', plan.id, 'name', e.target.value)} className="block w-full rounded-md border-neutral-300 py-1.5 px-3 text-sm focus:ring-primary-500 focus:border-primary-500 bg-surface text-neutral-800 print:font-bold transition-colors duration-300" placeholder="例如: 1F~5F 施作" />
                                            </div>
                                            <div className="w-full md:w-32">
                                                <label className="block text-xs text-neutral-500 mb-1 transition-colors duration-300 print:hidden">預計面積(m²)</label>
                                                <input type="number" value={plan.area} onChange={(e) => updateListField('dispatchPlans', plan.id, 'area', e.target.value)} className="block w-full rounded-md border-neutral-300 py-1.5 px-3 text-sm focus:ring-primary-500 focus:border-primary-500 bg-surface text-neutral-800 print-text-right transition-colors duration-300" placeholder="可選填" />
                                            </div>
                                            <div className="w-full md:w-32">
                                                <label className="block text-xs text-primary-600 font-bold mb-1 transition-colors duration-300 print:hidden">申請卷數</label>
                                                <input type="number" value={plan.rolls} onChange={(e) => updateListField('dispatchPlans', plan.id, 'rolls', e.target.value)} className="block w-full rounded-md border-primary-300 py-1.5 px-3 text-sm font-bold focus:ring-primary-500 focus:border-primary-500 bg-primary-50 text-primary-900 print-text-right transition-colors duration-300" placeholder="需要幾卷" />
                                            </div>
                                            <button onClick={() => removeListItem('dispatchPlans', plan.id)} className="mb-[2px] p-2 text-danger-500 hover:bg-danger-100 rounded-md transition-colors print:hidden"><Trash2 /></button>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => addListItem('dispatchPlans', { name: `第 ${dispatchPlans.length + 1} 批派工`, area: '', rolls: '' })} className="flex items-center gap-1 text-sm text-primary-600 font-medium hover:text-primary-700 mt-3 transition-colors duration-300 print:hidden"><Plus /> 新增派工批次</button>
                            </div>

                            {/* Part 3: 儀表板 */}
                            <div className="border-t border-neutral-200 pt-5 text-left transition-colors duration-300 print-avoid-break">
                                <div className="flex justify-between items-center mb-3">
                                    <SectionHeader title="3. 派工與進貨進度檢核" />
                                    <span className="text-[10px] text-neutral-400 transition-colors duration-300 print:hidden">預估系統最後更新：{new Date(estimateUpdatedAt || lastUpdated).toLocaleString()}</span>
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 bg-primary-50 p-4 rounded-lg border border-primary-100 print:bg-transparent print:border-neutral-200 transition-colors duration-300">
                                    <div>
                                        <div className="text-xs text-primary-800 mb-1 font-semibold transition-colors duration-300 print:text-black">累積已派工卷數</div>
                                        <div className="text-2xl font-bold text-neutral-800 transition-colors duration-300 print:text-black">{totalDispatchedRolls} <span className="text-sm font-normal text-neutral-500 print:text-black">卷</span></div>
                                    </div>
                                    <div className="bg-surface p-2 rounded border border-primary-100 shadow-sm print:shadow-none print:border-neutral-200 transition-colors duration-300">
                                        <div className="text-xs text-primary-800 mb-1 font-semibold transition-colors duration-300 print:text-black">派工餘裕 (目標-已派)</div>
                                        <div className={`text-2xl font-bold ${remainingDispatchBudget >= 0 ? 'text-success-600' : 'text-danger-600'} transition-colors duration-300 print:text-black`}>
                                            {remainingDispatchBudget >= 0 ? '+' : ''}{remainingDispatchBudget} <span className="text-sm font-normal text-neutral-500 print:text-black">卷</span>
                                        </div>
                                        <div className={`text-[10px] mt-1 ${remainingDispatchBudget < 0 ? 'text-danger-500 font-bold' : 'text-neutral-400'} print:text-black transition-colors duration-300`}>
                                            {remainingDispatchBudget < 0 ? '⚠️ 派工已超出總預算' : '✔️ 在總預算額度內'}
                                        </div>
                                    </div>
                                    <div>
                                        <div className="text-xs text-primary-800 mb-1 font-semibold transition-colors duration-300 print:text-black">目前已進貨總計</div>
                                        <div className="text-2xl font-bold text-secondary-600 transition-colors duration-300 print:text-black">{totalDelivered} <span className="text-sm font-normal text-neutral-500 print:text-black">卷</span></div>
                                    </div>
                                    <div className="bg-surface p-2 rounded border border-primary-100 shadow-sm print:shadow-none print:border-neutral-200 transition-colors duration-300">
                                        <div className="text-xs text-primary-800 mb-1 font-semibold transition-colors duration-300 print:text-black">待補貨量 (已派-已進)</div>
                                        <div className={`text-2xl font-bold ${needToOrder > 0 ? 'text-warning-600' : 'text-neutral-500'} transition-colors duration-300 print:text-black`}>
                                            {needToOrder > 0 ? `+${needToOrder}` : '0'} <span className="text-sm font-normal text-neutral-500 print:text-black">卷</span>
                                        </div>
                                        <div className={`text-[10px] mt-1 ${needToOrder > 0 ? 'text-warning-600 font-bold' : 'text-neutral-400'} print:text-black transition-colors duration-300`}>
                                            {needToOrder > 0 ? '⚠️ 需聯絡廠商進貨' : '✔️ 現場庫存充足'}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </Card>

                        {/* 5. 成本 */}
                        <Card title="第五大項：成本分析" icon={Calculator} className="print-page-break">
                            <div className="grid md:grid-cols-2 gap-8">
                                <div>
                                    <SectionHeader title="施作費用 (未稅)" />
                                    <DynamicList 
                                        items={subPayments} 
                                        onAdd={() => addListItem('subPayments', { value: '' })}
                                        onRemove={(id) => removeListItem('subPayments', id)}
                                        onUpdate={(id, f, v) => updateListField('subPayments', id, f, v)}
                                        valueField="value"
                                        labelPrefix="請款" 
                                    />
                                    <div className="text-right text-sm mt-3 pt-3 border-t border-neutral-100 transition-colors duration-300 print-avoid-break">
                                        <div className="font-bold text-neutral-700 transition-colors duration-300">施工費總計 (未稅): {formatCurrency(totalSubPayment)}</div>
                                        <InlineTax amount={totalSubPayment} />
                                    </div>
                                    
                                    <div className="mt-6 pt-4 border-t border-neutral-200 transition-colors duration-300">
                                        <SectionHeader title="運費與雜項 (未稅)" />
                                        {shippingCosts.map(item => (
                                            <DeductionItem 
                                                key={item.id} item={item} 
                                                placeholder="例如: 第一批運費"
                                                updateRow={(id, f, v) => updateListField('shippingCosts', id, f, v)}
                                                onRemove={(id) => removeListItem('shippingCosts', id)}
                                            />
                                        ))}
                                        <button onClick={() => addListItem('shippingCosts', { name: '', value: '' })} className="flex items-center gap-1 text-sm text-primary-600 mt-2 transition-colors duration-300 print:hidden"><Plus size={16}/> 新增運費/雜項</button>
                                        <div className="text-right text-sm mt-3 pt-3 border-t border-neutral-100 transition-colors duration-300 print-avoid-break">
                                            <div className="font-bold text-neutral-700 transition-colors duration-300">運費總計 (未稅): {formatCurrency(totalShippingCost)}</div>
                                            <InlineTax amount={totalShippingCost} />
                                        </div>
                                    </div>
                                </div>
                                <div>
                                    <SectionHeader title="隔音墊成本 (未稅)" />
                                    <div className="bg-neutral-50 p-4 rounded-lg border border-neutral-200 mb-6 transition-colors duration-300 print:bg-transparent print-avoid-break">
                                        <div className="flex justify-between text-sm text-neutral-600 mb-1 transition-colors duration-300 print:text-black">
                                            <span>規格: {matType} ({ROLL_AREA} m²/卷)</span>
                                        </div>
                                        <div className="flex justify-between text-sm text-neutral-600 mb-2 transition-colors duration-300 print:text-black">
                                            <span>使用卷數: {formatNumber(totalUsedInventory)} 卷</span>
                                        </div>
                                        <div className="text-right text-sm border-t border-neutral-200 pt-2 mt-2 transition-colors duration-300">
                                            <div className="font-bold text-primary-700 transition-colors duration-300 print:text-black">隔音墊成本 (未稅): {formatCurrency(matTotalCost)}</div>
                                            <InlineTax amount={matTotalCost} />
                                        </div>
                                    </div>

                                    <SectionHeader title="膠材耗材設定 (不計稅金)" />
                                    <div className="flex gap-2 items-center mb-2 print-avoid-break">
                                        <div className="w-16 flex-shrink-0 text-sm text-left font-medium transition-colors duration-300">膠水</div>
                                        <div className="flex-1"><input type="number" value={glueBuckets} onChange={(e) => updateProjectField('glueBuckets', e.target.value)} className="block w-full rounded-md border-neutral-300 py-1 px-2 text-sm border focus:ring-primary-500 focus:border-primary-500 bg-surface text-neutral-800 print-text-right transition-colors duration-300" placeholder="數量" /></div>
                                        <span className="text-neutral-400 text-sm transition-colors duration-300">&times;</span>
                                        <div className="flex-1"><input type="number" value={glueUnitPrice} onChange={(e) => updateProjectField('glueUnitPrice', e.target.value)} className="block w-full rounded-md border-neutral-300 py-1 px-2 text-sm border focus:ring-primary-500 focus:border-primary-500 text-primary-700 bg-surface print-text-right transition-colors duration-300" placeholder="單價" /></div>
                                    </div>
                                    <div className="flex gap-2 items-center mb-2 print-avoid-break">
                                        <div className="w-16 flex-shrink-0 text-sm text-left font-medium transition-colors duration-300">寬版膠帶</div>
                                        <div className="flex-1"><input type="number" value={tapeWideRolls} onChange={(e) => updateProjectField('tapeWideRolls', e.target.value)} className="block w-full rounded-md border-neutral-300 py-1 px-2 text-sm border focus:ring-primary-500 focus:border-primary-500 bg-surface text-neutral-800 print-text-right transition-colors duration-300" placeholder="數量" /></div>
